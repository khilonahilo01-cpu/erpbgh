// ─── TASK BOARD ───────────────────────────────────────────
function TaskBoard({client,data,onBack,addTask,updTask,delTask,addComment,approveTask,rejectTask,requestMoveTask,showToast,isAdmin,logout,me}){
  const[addStage,setAddStage]=useState(null);const[selTask,setSelTask]=useState(null);
  const[rejectModal,setRejectModal]=useState(null);const[rejectReason,setRejectReason]=useState('');
  const myTasks=useMemo(()=>{
    if(!isAdmin&&me)return data.tasks.filter(t=>t.clientId===client.id&&(t.assignees||[]).includes(me.id));
    return data.tasks.filter(t=>t.clientId===client.id);
  },[data.tasks,client.id,isAdmin,me]);
  const byStage=useMemo(()=>{const m={};TASK_STAGES.forEach(s=>{m[s.id]=myTasks.filter(t=>t.stage===s.id);});return m;},[myTasks]);

  // Admin moves directly
  const moveTask=(taskId,newStage)=>{
    const t=data.tasks.find(x=>x.id===taskId);const to=TASK_STAGES.find(s=>s.id===newStage)?.label;
    updTask(taskId,{stage:newStage,pendingStage:null},`الأدمين نقل: ${t?.title} → ${to}`);
    showToast(`✅ نقلت لـ ${to}`);
  };

  // Member requests move (waits for admin approval)
  const memberRequestMove=(taskId,newStage)=>{
    requestMoveTask(taskId,newStage,me?.name||'عضو');
    showToast(`🟡 طلب الانتقال أُرسل للأدمين`,'warning');
  };
  const freshTask=selTask?data.tasks.find(t=>t.id===selTask.id):null;
  return(<div style={{fontFamily:"'Cairo',sans-serif",minHeight:'100vh',background:B.bg}}>
    <div style={{background:B.nav,borderBottom:`1px solid ${_theme==='dark'?'#333':'#e4e4e7'}`,position:'sticky',top:0,zIndex:30}}>
      <div style={{maxWidth:'90rem',margin:'0 auto',padding:'0 1rem',display:'flex',alignItems:'center',justifyContent:'space-between',height:'52px',gap:'0.75rem'}}>
        <div style={{display:'flex',alignItems:'center',gap:'0.75rem'}}>
          <button onClick={onBack} style={{background:'rgba(255,255,255,0.1)',border:'none',borderRadius:'0.5rem',padding:'0.4rem 0.625rem',cursor:'pointer',display:'flex',color:'white'}}><Ic n="chevR" size={18} color="white"/></button>
          <div style={{width:8,height:8,borderRadius:'50%',background:client.color||B.accent,flexShrink:0}}/>
          <span style={{fontWeight:'800',color:'white',fontSize:'0.95rem'}}>{client.name}</span>
          <span style={{fontSize:'0.72rem',color:'rgba(255,255,255,0.5)'}}>{myTasks.filter(t=>t.stage!=='done').length} مهمة نشطة</span>
        </div>
        <div style={{display:'flex',gap:'0.5rem',alignItems:'center'}}>
          {isAdmin&&<button onClick={()=>setAddStage('script')} style={{display:'flex',alignItems:'center',gap:'0.4rem',padding:'0.4rem 0.875rem',borderRadius:'9999px',background:B.accent,color:'white',fontWeight:'700',border:'none',cursor:'pointer',fontSize:'0.8rem'}}><Ic n="plus" size={14} color="white"/>مهمة</button>}
          <button onClick={toggleTheme} style={{background:'rgba(255,255,255,0.1)',border:'none',borderRadius:'9999px',padding:'0.35rem 0.625rem',cursor:'pointer',display:'flex',color:'rgba(255,255,255,0.7)'}}><Ic n={_theme==='dark'?'sun':'moon'} size={14} color="rgba(255,255,255,0.7)"/></button>
          <button onClick={logout} style={{padding:'0.35rem 0.625rem',borderRadius:'9999px',border:'1px solid rgba(255,255,255,0.2)',background:'transparent',color:'rgba(255,255,255,0.7)',cursor:'pointer',fontSize:'0.75rem',display:'flex',alignItems:'center',gap:'3px'}}><Ic n="logout" size={13} color="rgba(255,255,255,0.7)"/>خروج</button>
        </div>
      </div>
    </div>
    <div style={{padding:'1rem'}}>
      <div className="scroll-x">
        {TASK_STAGES.map(stage=>{
          const tasks=byStage[stage.id]||[];
          return(<div key={stage.id} style={{minWidth:'255px',maxWidth:'255px',display:'flex',flexDirection:'column',gap:'0.5rem'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0.375rem 0.25rem'}}>
              <div style={{display:'flex',alignItems:'center',gap:'0.5rem'}}>
                <span>{stage.icon}</span>
                <span style={{fontWeight:'700',color:B.text,fontSize:'0.875rem'}}>{stage.label}</span>
                <span style={{fontSize:'0.7rem',padding:'1px 7px',borderRadius:'9999px',background:`${stage.color}22`,color:stage.color,fontWeight:'700'}}>{tasks.length}</span>
              </div>
              {isAdmin&&<button onClick={()=>setAddStage(stage.id)} style={{background:'none',border:'none',cursor:'pointer',color:B.muted,display:'flex',padding:'2px'}}><Ic n="plus" size={16}/></button>}
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:'0.625rem'}}>
              {tasks.map(task=>(<TaskCard key={task.id} task={task} data={data} onClick={()=>setSelTask(task)} isAdmin={isAdmin} me={me} currentStage={stage.id}
                onMove={isAdmin?(id,s)=>moveTask(id,s):null}
                onMemberDone={!isAdmin&&me&&(task.assignees||[]).includes(me.id)&&!task.pendingStage?(id)=>{const si=TASK_STAGES.findIndex(s=>s.id===task.stage);const next=TASK_STAGES[si+1];if(next)memberRequestMove(id,next.id);}:null}
                onApprove={isAdmin&&task.pendingStage?()=>approveTask(task.id):null}
                onReject={isAdmin&&task.pendingStage?()=>{setRejectModal(task.id);setRejectReason('');}:null}
                onDelete={isAdmin?()=>delTask(task.id):null}/>))}
              {isAdmin&&<button onClick={()=>setAddStage(stage.id)} style={{padding:'0.5rem',borderRadius:'0.75rem',border:`1px dashed ${B.border}`,background:'transparent',color:B.muted,cursor:'pointer',fontSize:'0.8rem',textAlign:'center'}}>+ زيد</button>}
            </div>
          </div>);
        })}
      </div>
    </div>
    {addStage&&<AddTaskModal stage={addStage} client={client} members={data.members} onClose={()=>setAddStage(null)} onSave={t=>{addTask(t);setAddStage(null);}}/>}
    {rejectModal&&(<Modal onClose={()=>setRejectModal(null)} title="سبب الإرجاع"><div style={{display:'flex',flexDirection:'column',gap:'1rem'}}><Field label="ملاحظة للعضو (اختياري)"><textarea value={rejectReason} onChange={e=>setRejectReason(e.target.value)} placeholder="مثال: راجع السكريبت..." style={{...INP,height:80,resize:'none'}} autoFocus/></Field><div style={{display:'flex',gap:'0.5rem'}}><button onClick={()=>{rejectTask(rejectModal,rejectReason);setRejectModal(null);}} style={{flex:1,padding:'0.75rem',borderRadius:'0.75rem',background:B.danger,color:'white',fontWeight:'700',border:'none',cursor:'pointer'}}>↩️ ارجع المهمة</button><button onClick={()=>setRejectModal(null)} style={{padding:'0.75rem 1rem',borderRadius:'0.75rem',border:`1px solid ${B.border}`,background:'transparent',color:B.muted,cursor:'pointer',fontWeight:'700'}}>إلغاء</button></div></div></Modal>)}
    {freshTask&&<TaskDetail task={freshTask} data={data} onClose={()=>setSelTask(null)} onUpdate={(p,msg)=>updTask(freshTask.id,p,msg)} onDelete={isAdmin?()=>{delTask(freshTask.id);setSelTask(null);}:null} onMove={isAdmin?(id,s)=>moveTask(id,s):null} onAddComment={addComment} isAdmin={isAdmin} me={me}/>}
  </div>);
}

      {task.shootDate&&<div style={{color:B.info}}>📷 {fmtD(task.shootDate)}</div>}
      {task.link&&<div style={{color:B.info,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>🔗 رابط مرفق</div>}

      <div style={{display:'flex',gap:'0.4rem',alignItems:'center'}}>

        {cc>0&&<span style={{fontSize:'0.7rem',color:B.muted,display:'flex',alignItems:'center',gap:'2px'}}><Ic n="message" size={11}/>{cc}</span>}
      </div>
      <div style={{display:'flex',gap:'-4px'}}>
        {assignees.slice(0,3).map((m,i)=><div key={m.id} style={{marginRight:i>0?'-6px':'0',border:`2px solid ${B.card}`,borderRadius:'50%'}}><Av name={m.name} color={m.color} size={22} fs={8}/></div>)}
        {assignees.length>3&&<div style={{width:22,height:22,borderRadius:'50%',background:B.border,display:'grid',placeItems:'center',fontSize:'8px',color:B.muted,marginRight:'-6px',border:`2px solid ${B.card}`}}>+{assignees.length-3}</div>}
      </div>
    </div>
    <div onClick={e=>e.stopPropagation()} style={{display:'flex',gap:'0.25rem',marginTop:'0.625rem',paddingTop:'0.625rem',borderTop:`1px solid ${B.border}`,flexWrap:'wrap'}}>

      {task.pendingStage&&(
        <div style={{width:'100%',marginBottom:'0.375rem'}}>
          <div style={{fontSize:'0.72rem',padding:'0.35rem 0.625rem',borderRadius:'0.5rem',background:`${B.warning}15`,color:B.warning,fontWeight:'700',textAlign:'center',marginBottom:'0.375rem'}}>
            🟡 في انتظار موافقة الأدمين → {TASK_STAGES.find(s=>s.id===task.pendingStage)?.label}

        {isAdmin&&prev&&<button onClick={()=>onMove(task.id,prev.id)} style={{flex:1,padding:'0.3rem',borderRadius:'0.5rem',border:`1px solid ${B.border}`,background:'transparent',color:B.muted,cursor:'pointer',fontSize:'0.7rem',display:'flex',alignItems:'center',justifyContent:'center',gap:'2px'}}><Ic n="chevR" size={12}/>{prev.label}</button>}

function TaskDetail({task,data,onClose,onUpdate,onDelete,onMove,onAddComment,isAdmin,me}){
  const[msgType,setMsgType]=useState(
    me?.role==='scriptwriter'?'script':'comment'
  );
  const[comment,setComment]=useState('');
  const[editing,setEditing]=useState(false);
  const[expandedScript,setExpandedScript]=useState(null);
  const[f,setF]=useState({title:task.title,description:task.description||'',shootDate:task.shootDate||'',dueDate:task.dueDate||'',priority:task.priority||'normal',contentType:task.contentType||'reel',link:task.link||'',assignees:task.assignees||[]});
  const toggle=id=>setF(p=>({...p,assignees:p.assignees.includes(id)?p.assignees.filter(x=>x!==id):[...p.assignees,id]}));
  const comments=data.comments.filter(c=>c.taskId===task.id).sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt));
  const assigned=data.members.filter(m=>(task.assignees||[]).includes(m.id));
  const si_=TASK_STAGES.find(s=>s.id===task.stage);
  const pr_=PRIOS.find(p=>p.id===task.priority);
  const ct_=CTYPES.find(c=>c.id===task.contentType);
  const od=isOverdue(task.dueDate);const td=isToday(task.dueDate);

  const sendComment=()=>{
    if(!comment.trim())return;
    onAddComment(task.id,me?.id||'admin',me?.name||'أدمين',comment.trim(),msgType);
    setComment('');
  };
  const saveEdit=()=>{if(!f.title.trim())return;onUpdate({...f,shootDate:f.shootDate||null,dueDate:f.dueDate||null,link:f.link||null},`تعديل: ${f.title}`);setEditing(false);};

  // Message type config
  // Message types — all team members can add notes
  const MSG_TYPES_AVAIL=[
    {v:'comment', l:'💬 تعليق',   ph:'اكتب تعليق...'},
    {v:'note',    l:'📌 ملاحظة',  ph:'اكتب ملاحظة للفريق كاملاً...'},
    {v:'script',  l:'📝 سكريبت',  ph:'الصق السكريبت أو المحتوى هنا...'},
  ];
  const currentType=MSG_TYPES_AVAIL.find(t=>t.v===msgType)||MSG_TYPES_AVAIL[0];
  const isMultiline=msgType==='script'||msgType==='note';

  return(<Modal onClose={onClose} title="" width="36rem">
    <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
      {/* Stage + type badges */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:'0.5rem'}}>
        <div style={{display:'flex',gap:'0.4rem',flexWrap:'wrap'}}>
          <Badge label={`${si_?.icon} ${si_?.label}`} color={si_?.color}/>
          {ct_&&<Badge label={`${ct_.i} ${ct_.l}`} color={B.muted}/>}
          {pr_&&<Badge label={pr_.l} color={pr_.c}/>}
        </div>
        <div style={{display:'flex',gap:'0.25rem'}}>
          {isAdmin&&<button onClick={()=>setEditing(!editing)} style={{padding:'0.35rem 0.625rem',borderRadius:'0.5rem',border:`1px solid ${B.border}`,background:'transparent',color:B.muted,cursor:'pointer',fontSize:'0.75rem',display:'flex',alignItems:'center',gap:'3px'}}><Ic n="pencil" size={13}/>تعديل</button>}
          {isAdmin&&onDelete&&<button onClick={onDelete} style={{padding:'0.35rem',border:'none',background:'none',cursor:'pointer',display:'flex'}}><Ic n="trash" size={15} color={B.danger}/></button>}
        </div>
      </div>

      {editing?(<div style={{display:'flex',flexDirection:'column',gap:'0.75rem'}}>
        <Field label="العنوان"><input value={f.title} onChange={e=>setF({...f,title:e.target.value})} style={INP}/></Field>
        <Field label="الوصف"><textarea value={f.description} onChange={e=>setF({...f,description:e.target.value})} style={{...INP,height:60,resize:'none'}}/></Field>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.75rem'}}>
          <Field label="نوع المحتوى"><select value={f.contentType} onChange={e=>setF({...f,contentType:e.target.value})} style={INP}>{CTYPES.map(c=><option key={c.id} value={c.id}>{c.i} {c.l}</option>)}</select></Field>
          <Field label="الأولوية"><select value={f.priority} onChange={e=>setF({...f,priority:e.target.value})} style={INP}>{PRIOS.map(p=><option key={p.id} value={p.id}>{p.l}</option>)}</select></Field>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.75rem'}}>
          <Field label="📷 تصوير"><input type="date" value={f.shootDate} onChange={e=>setF({...f,shootDate:e.target.value})} style={INP}/></Field>
          <Field label="📅 تسليم"><input type="date" value={f.dueDate} onChange={e=>setF({...f,dueDate:e.target.value})} style={INP}/></Field>
        </div>
        <Field label="🔗 رابط"><input value={f.link} onChange={e=>setF({...f,link:e.target.value})} placeholder="https://..." style={INP}/></Field>
        <Field label="الفريق"><div style={{display:'flex',flexDirection:'column',gap:'0.375rem'}}>{data.members.map(m=>(<label key={m.id} style={{display:'flex',alignItems:'center',gap:'0.625rem',padding:'0.5rem 0.75rem',borderRadius:'0.75rem',background:f.assignees.includes(m.id)?`${m.color}15`:B.inputBg,border:`1px solid ${f.assignees.includes(m.id)?m.color:B.border}`,cursor:'pointer'}}><input type="checkbox" checked={f.assignees.includes(m.id)} onChange={()=>toggle(m.id)} style={{width:15,height:15,accentColor:m.color}}/><Av name={m.name} color={m.color} size={26} fs={9}/><span style={{fontSize:'0.85rem',fontWeight:'700',color:B.text}}>{m.name}</span></label>))}</div></Field>
        <div style={{display:'flex',gap:'0.5rem'}}><button onClick={saveEdit} style={{flex:1,padding:'0.75rem',borderRadius:'0.75rem',background:B.accent,color:'white',fontWeight:'700',border:'none',cursor:'pointer'}}>حفظ</button><button onClick={()=>setEditing(false)} style={{padding:'0.75rem 1rem',borderRadius:'0.75rem',border:`1px solid ${B.border}`,background:'transparent',color:B.muted,cursor:'pointer',fontWeight:'700'}}>إلغاء</button></div>
      </div>):(<>
        {/* Task info */}
        <div>
          <h3 style={{fontSize:'1.1rem',fontWeight:'800',color:B.text,lineHeight:1.4}}>{task.title}</h3>
          {task.description&&<p style={{fontSize:'0.875rem',color:B.muted,marginTop:'0.375rem',lineHeight:1.6}}>{task.description}</p>}
        </div>
        <div style={{display:'flex',gap:'0.5rem',flexWrap:'wrap'}}>
          {task.shootDate&&<div style={{fontSize:'0.8rem',color:B.info,background:`${B.info}15`,padding:'0.35rem 0.75rem',borderRadius:'9999px'}}>📷 {fmtD(task.shootDate)}</div>}
          {task.dueDate&&<div style={{fontSize:'0.8rem',color:od?B.danger:td?B.warning:B.muted,background:`${od?B.danger:td?B.warning:B.border}18`,padding:'0.35rem 0.75rem',borderRadius:'9999px',fontWeight:od||td?'700':'400'}}>📅 {od?'⚠️ متأخر ':td?'اليوم ':''}{fmtD(task.dueDate)}</div>}
          {task.link&&<a href={task.link} target="_blank" rel="noopener noreferrer" style={{fontSize:'0.8rem',color:B.info,background:`${B.info}15`,padding:'0.35rem 0.75rem',borderRadius:'9999px',textDecoration:'none',border:`1px solid ${B.info}33`}}>🔗 فتح الرابط ↗</a>}
        </div>
        {assigned.length>0&&<div style={{display:'flex',gap:'0.5rem',flexWrap:'wrap'}}>{assigned.map(m=>(<div key={m.id} style={{display:'flex',alignItems:'center',gap:'0.4rem',padding:'0.3rem 0.625rem 0.3rem 0.375rem',borderRadius:'9999px',background:`${m.color}15`,border:`1px solid ${m.color}33`}}><Av name={m.name} color={m.color} size={22} fs={8}/><span style={{fontSize:'0.8rem',fontWeight:'700',color:B.text}}>{m.name}</span></div>))}</div>}
        {isAdmin&&onMove&&(<div><div style={{fontSize:'0.75rem',fontWeight:'700',color:B.muted,marginBottom:'0.5rem'}}>نقل المهمة</div><div style={{display:'flex',gap:'0.4rem',flexWrap:'wrap'}}>{TASK_STAGES.map(s=>(<button key={s.id} onClick={()=>onUpdate({stage:s.id},`نقل → ${s.label}`)} style={{padding:'0.35rem 0.625rem',borderRadius:'9999px',border:`1px solid ${s.id===task.stage?s.color:B.border}`,background:s.id===task.stage?`${s.color}22`:'transparent',color:s.id===task.stage?s.color:B.muted,cursor:'pointer',fontSize:'0.78rem',fontWeight:s.id===task.stage?'700':'400'}}>{s.icon} {s.label}</button>))}</div></div>)}
        {!isAdmin&&task.stage!=='done'&&(task.assignees||[]).includes(me?.id)&&(<button onClick={()=>{const si=TASK_STAGES.findIndex(s=>s.id===task.stage);const next=TASK_STAGES[si+1];if(next){onUpdate({stage:next.id},`${me?.name} انتهى → ${next.label}`);}onClose();}} style={{width:'100%',padding:'0.875rem',borderRadius:'0.75rem',background:`${B.success}15`,border:`1px solid ${B.success}33`,color:B.success,fontWeight:'700',cursor:'pointer',fontSize:'0.875rem',display:'flex',alignItems:'center',justifyContent:'center',gap:'0.5rem'}}>✓ انتهيت — نقل لـ {TASK_STAGES[TASK_STAGES.findIndex(s=>s.id===task.stage)+1]?.label||'التالية'}</button>)}
      </>)}

      {/* ─── COLLABORATION WALL ─── */}
      <div style={{borderTop:`1px solid ${B.border}`,paddingTop:'1rem'}}>

        {/* Header */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'0.875rem'}}>
          <div style={{display:'flex',alignItems:'center',gap:'0.5rem'}}>
            <span style={{fontSize:'1rem'}}>🧱</span>
            <span style={{fontWeight:'800',color:B.text,fontSize:'0.95rem'}}>حائط الفريق</span>
            <span style={{fontSize:'0.7rem',padding:'1px 7px',borderRadius:'9999px',background:B.inputBg,color:B.muted,fontWeight:'600'}}>{comments.length}</span>
          </div>
          {/* Pinned notes count */}
          {comments.filter(c=>c.type==='note').length>0&&(
            <div style={{fontSize:'0.7rem',color:'#d97706',display:'flex',alignItems:'center',gap:'3px',padding:'2px 8px',background:'#faeeda',borderRadius:'9999px',fontWeight:'700'}}>
              📌 {comments.filter(c=>c.type==='note').length} ملاحظة
            </div>
          )}
        </div>

        {/* Messages */}
        <div style={{display:'flex',flexDirection:'column',gap:'0.625rem',maxHeight:'280px',overflowY:'auto',marginBottom:'0.875rem',paddingLeft:'2px',paddingRight:'2px'}}>
          {comments.length===0&&(
            <div style={{textAlign:'center',padding:'1.5rem',color:B.muted,fontSize:'0.8rem'}}>
              <div style={{fontSize:'1.5rem',marginBottom:'0.5rem'}}>💬</div>
              ابدا التواصل مع الفريق هنا
            </div>
          )}
          {comments.map(c=>{
            const member=data.members.find(m=>m.id===c.memberId);
            const isNote=c.type==='note';
            const isScript=c.type==='script';
            const isExpanded=expandedScript===c.id;
            const memberColor=member?.color||B.accent;

            // Pinned note style
            if(isNote){
              const isAdminNote=c.memberId==='admin'||!data.members.find(m=>m.id===c.memberId);
              return(
              <div key={c.id} style={{background:isAdminNote?`#faeeda`:`${B.info}10`,border:`1px solid ${isAdminNote?'#f59e0b44':B.info+'44'}`,borderRadius:'1rem',padding:'0.75rem',borderRight:`3px solid ${isAdminNote?'#d97706':B.info}`}}>
                <div style={{display:'flex',alignItems:'center',gap:'0.5rem',marginBottom:'0.375rem'}}>
                  <span>📌</span>
                  {isAdminNote
                    ?<span style={{fontSize:'0.72rem',fontWeight:'800',color:'#92400e'}}>ملاحظة من الأدمين</span>
                    :<><Av name={c.memberName||'M'} color={member?.color||B.info} size={20} fs={8}/><span style={{fontSize:'0.72rem',fontWeight:'800',color:B.info}}>{c.memberName}</span></>
                  }
                  <span style={{marginRight:'auto',fontSize:'0.65rem',color:isAdminNote?'#b45309':B.muted}}>{fmtDT(c.createdAt)}</span>
                </div>
                <div style={{fontSize:'0.875rem',color:isAdminNote?'#78350f':B.text,lineHeight:1.6,whiteSpace:'pre-wrap'}}>{c.content}</div>
              </div>
            );}

            // Script style
            if(isScript)return(
              <div key={c.id} style={{background:B.inputBg,border:`1px solid #534ab744`,borderRadius:'1rem',padding:'0.75rem',borderRight:`3px solid #534ab7`}}>
                <div style={{display:'flex',alignItems:'center',gap:'0.5rem',marginBottom:'0.5rem',justifyContent:'space-between'}}>
                  <div style={{display:'flex',alignItems:'center',gap:'0.5rem'}}>
                    <Av name={c.memberName||'S'} color={memberColor} size={24} fs={9}/>
                    <div>
                      <div style={{fontSize:'0.75rem',fontWeight:'700',color:B.text}}>{c.memberName}</div>
                      <div style={{fontSize:'0.62rem',color:'#534ab7',fontWeight:'600'}}>📝 سكريبت</div>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:'0.375rem',alignItems:'center'}}>
                    <span style={{fontSize:'0.65rem',color:B.muted}}>{fmtDT(c.createdAt)}</span>
                    <button onClick={()=>{navigator.clipboard?.writeText(c.content);}}
                      style={{padding:'2px 7px',borderRadius:'6px',border:`1px solid ${B.border}`,background:B.card,color:B.muted,cursor:'pointer',fontSize:'0.65rem',fontWeight:'700'}}>
                      نسخ
                    </button>
                    <button onClick={()=>setExpandedScript(isExpanded?null:c.id)}
                      style={{padding:'2px 7px',borderRadius:'6px',border:`1px solid ${B.border}`,background:B.card,color:B.muted,cursor:'pointer',fontSize:'0.65rem',fontWeight:'700'}}>
                      {isExpanded?'طوي':'وسّع'}
                    </button>
                  </div>
                </div>
                <div style={{fontFamily:'monospace',fontSize:'0.8rem',color:B.text,lineHeight:1.7,background:B.card,borderRadius:'0.625rem',padding:'0.625rem 0.75rem',whiteSpace:'pre-wrap',wordBreak:'break-word',maxHeight:isExpanded?'none':'100px',overflow:isExpanded?'visible':'hidden',position:'relative'}}>
                  {c.content}
                  {!isExpanded&&c.content.length>200&&<div style={{position:'absolute',bottom:0,left:0,right:0,height:'40px',background:`linear-gradient(transparent,${B.card})`}}/>}
                </div>
              </div>
            );

            // Normal comment
            return(
              <div key={c.id} style={{display:'flex',gap:'0.5rem',alignItems:'flex-start'}}>
                <Av name={c.memberName||'A'} color={memberColor} size={30} fs={10}/>
                <div style={{flex:1,background:B.card2,borderRadius:'0.875rem 0.875rem 0.875rem 0.25rem',padding:'0.5rem 0.75rem',border:`1px solid ${B.border}`}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:'2px',alignItems:'center'}}>
                    <span style={{fontSize:'0.75rem',fontWeight:'700',color:B.text}}>{c.memberName}</span>
                    <span style={{fontSize:'0.62rem',color:B.muted}}>{fmtDT(c.createdAt)}</span>
                  </div>
                  <div style={{fontSize:'0.825rem',color:_theme==='dark'?'#ccc':B.text,lineHeight:1.5,whiteSpace:'pre-wrap'}}>{c.content}</div>
                </div>
              </div>
            );
          })}
        </div>

        {/* Message type selector */}
        {MSG_TYPES_AVAIL.length>1&&(
          <div style={{display:'flex',gap:'0.375rem',marginBottom:'0.5rem'}}>
            {MSG_TYPES_AVAIL.map(t=>(
              <button key={t.v} onClick={()=>setMsgType(t.v)}
                style={{padding:'0.3rem 0.75rem',borderRadius:'9999px',border:`1px solid ${msgType===t.v?B.accent:B.border}`,background:msgType===t.v?`${B.accent}15`:'transparent',color:msgType===t.v?B.accent:B.muted,cursor:'pointer',fontSize:'0.75rem',fontWeight:'700',whiteSpace:'nowrap'}}>
                {t.l}
              </button>
            ))}
          </div>
        )}

        {/* Input area */}
        <div style={{display:'flex',gap:'0.5rem',alignItems:'flex-end'}}>
          {isMultiline?(
            <textarea value={comment} onChange={e=>setComment(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&e.ctrlKey&&sendComment()}
              placeholder={currentType.ph}
              style={{...INP,flex:1,height:msgType==='script'?'120px':'80px',resize:'none',fontFamily:msgType==='script'?'monospace':INP.fontFamily,fontSize:'0.85rem',lineHeight:1.6}}/>
          ):(
            <input value={comment} onChange={e=>setComment(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&sendComment()}
              placeholder={currentType.ph}
              style={{...INP,flex:1}}/>
          )}
          <button onClick={sendComment}
            style={{padding:'0.75rem',borderRadius:'0.875rem',background:B.accent,color:'white',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,width:'44px',height:'44px'}}>
            <Ic n="send" size={16} color="white"/>
          </button>
        </div>
        {isMultiline&&<div style={{fontSize:'0.65rem',color:B.muted,marginTop:'4px',textAlign:'left'}}>Ctrl+Enter للإرسال</div>}
      </div>
    </div>
  </Modal>);
}

// ─── ROLE MAPPINGS ────────────────────────────────────────
const ROLE_PRIMARY_STAGE={
  scriptwriter:'script',
  photographer:'shoot',
  editor:'edit',
  designer:'edit',
  manager:null,
  other:null,
};
const ROLE_COLOR={
  scriptwriter:'#534ab7',
  photographer:'#185fa5',
  editor:'#b04a2f',
  designer:'#16a34a',
  manager:'#d97706',
  other:'#888',
};

function MemberApp({data,persist,showToast,logout,me,addMemberPayment}){
  const myRole=me?.role||'other';
  const primaryStage=ROLE_PRIMARY_STAGE[myRole];
  const roleColor=ROLE_COLOR[myRole]||B.accent;
  const pStage=TASK_STAGES.find(s=>s.id===primaryStage);
  const roleLabel=ROLES.find(r=>r.id===myRole)?.l||myRole;

  const[selTask,setSelTask]=useState(null);
  const[selClient,setSelClient]=useState(null);
  const[showDone,setShowDone]=useState(false);
  const[payModal,setPayModal]=useState(null);
  const[payAmt,setPayAmt]=useState('');
  const[payNote,setPayNote]=useState('');

  const myTasks=useMemo(()=>data.tasks.filter(t=>(t.assignees||[]).includes(me?.id)),[data.tasks,me]);
  const stageTasks=useMemo(()=>{
    let t=primaryStage
      ?myTasks.filter(x=>x.stage===primaryStage)
      :myTasks.filter(x=>x.stage!=='done'&&x.stage!=='post');
    if(selClient)t=t.filter(x=>x.clientId===selClient);
    return t;
  },[myTasks,primaryStage,selClient]);
  const doneTasks=useMemo(()=>{
    let t=myTasks.filter(x=>x.stage==='done'||x.stage==='post');
    if(selClient)t=t.filter(x=>x.clientId===selClient);
    return t;
  },[myTasks,selClient]);

  const myPayments=(data.memberPayments||[]).filter(p=>p.memberId===me?.id);
  const totalEarned=myPayments.filter(p=>p.status==='paid').reduce((s,p)=>s+Number(p.amount),0);
  const totalPending=myPayments.filter(p=>p.status==='pending').reduce((s,p)=>s+Number(p.amount),0);
  const overdue=myTasks.filter(t=>t.stage!=='done'&&t.stage!=='post'&&isOverdue(t.dueDate)).length;

  const addComment=(taskId,memberId,memberName,content,type='comment')=>{
    const c={id:uid(),taskId,memberId,memberName,content,type,createdAt:new Date().toISOString()};
    persist({...data,comments:[...data.comments,c]});
  };
  const updTask=(id,patch,msg)=>{
    const activity=[{id:uid(),action:'update_task',detail:msg||me?.name,memberId:me?.id,memberName:me?.name,createdAt:new Date().toISOString()},...(data.activity||[]).slice(0,199)];
    persist({...data,tasks:data.tasks.map(t=>t.id===id?{...t,...patch}:t),activity});
  };
  const requestMove=(taskId,nextStage)=>{
    const t=data.tasks.find(x=>x.id===taskId);
    setPayModal({taskId,taskTitle:t?.title||'',nextStage});
    setPayAmt('');setPayNote('');
  };
  const confirmDone=()=>{
    if(!payModal)return;
    const{taskId,taskTitle,nextStage}=payModal;
    const stageName=TASK_STAGES.find(s=>s.id===nextStage)?.label;
    if(payAmt&&Number(payAmt)>0){
      addMemberPayment({taskId,taskTitle,memberId:me?.id,memberName:me?.name,amount:Number(payAmt),note:payNote,status:'pending'});
    }
    const c={id:uid(),taskId,memberId:me?.id,memberName:me?.name,content:`🟡 انتهيت — في انتظار موافقة الأدمين → ${stageName}${payAmt?` · ${fmt(Number(payAmt))} دج`:''}`,createdAt:new Date().toISOString(),type:'comment'};
    const activity=[{id:uid(),action:'request_move',detail:`${me?.name}: ${taskTitle} → ${stageName}`,memberId:me?.id,memberName:me?.name,createdAt:new Date().toISOString()},...(data.activity||[]).slice(0,199)];
    persist({...data,tasks:data.tasks.map(x=>x.id===taskId?{...x,pendingStage:nextStage}:x),comments:[...data.comments,c],activity});
    setPayModal(null);
    showToast('🟡 طلبك أُرسل للأدمين','warning');
  };

  const freshTask=selTask?data.tasks.find(t=>t.id===selTask.id):null;
  const displayTasks=showDone?doneTasks:stageTasks;

  return(
    <div style={{fontFamily:"'Cairo',sans-serif",minHeight:'100vh',background:B.bg}}>
      <div style={{background:B.nav,position:'sticky',top:0,zIndex:30,borderBottom:`1px solid ${_theme==='dark'?'#333':'#e4e4e7'}`}}>
        <div style={{maxWidth:'640px',margin:'0 auto',padding:'0 1rem',display:'flex',alignItems:'center',justifyContent:'space-between',height:'52px',gap:'0.75rem'}}>
          <div style={{display:'flex',alignItems:'center',gap:'0.75rem'}}>
            <div style={{width:36,height:36,background:roleColor,borderRadius:'10px',display:'grid',placeItems:'center',flexShrink:0,boxShadow:`0 4px 12px ${roleColor}44`}}>
              <span style={{fontSize:'1rem'}}>{pStage?.icon||'👤'}</span>
            </div>
            <div>
              <div style={{fontWeight:'800',color:'white',fontSize:'0.9rem',lineHeight:1}}>{me?.name}</div>
              <div style={{fontSize:'0.65rem',marginTop:'2px',display:'flex',gap:'0.4rem',alignItems:'center'}}>
                <span style={{padding:'1px 6px',borderRadius:'9999px',background:roleColor,color:'white',fontWeight:'700',fontSize:'0.62rem'}}>{roleLabel}</span>
                {overdue>0&&<span style={{color:B.danger,fontWeight:'700'}}>⚠️ {overdue}</span>}
              </div>
            </div>
          </div>
          <div style={{display:'flex',gap:'0.5rem'}}>
            <button onClick={toggleTheme} style={{background:'rgba(255,255,255,0.1)',border:'none',borderRadius:'9999px',padding:'0.35rem 0.5rem',cursor:'pointer',display:'flex'}}><Ic n={_theme==='dark'?'sun':'moon'} size={14} color="rgba(255,255,255,0.7)"/></button>
            <button onClick={logout} style={{padding:'0.35rem 0.625rem',borderRadius:'9999px',border:'1px solid rgba(255,255,255,0.2)',background:'transparent',color:'rgba(255,255,255,0.7)',cursor:'pointer',fontSize:'0.75rem',display:'flex',alignItems:'center',gap:'3px'}}><Ic n="logout" size={13} color="rgba(255,255,255,0.7)"/>خروج</button>
          </div>
        </div>
      </div>

      <div style={{maxWidth:'640px',margin:'0 auto',padding:'1rem',display:'flex',flexDirection:'column',gap:'1rem'}}>

        {/* Earnings card */}
        <div style={{background:`linear-gradient(135deg,${roleColor},${roleColor}bb)`,borderRadius:'1.5rem',padding:'1.25rem',color:'white',boxShadow:`0 8px 24px ${roleColor}44`}}>
          <div style={{fontSize:'0.78rem',opacity:0.85,marginBottom:'0.5rem',fontWeight:'600'}}>💰 حسابي الكلي</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.75rem',marginBottom:myPayments.length>0?'0.875rem':'0'}}>
            <div>
              <div style={{fontSize:'2rem',fontWeight:'900',fontVariantNumeric:'tabular-nums',lineHeight:1}}>{fmt(totalEarned)}</div>
              <div style={{fontSize:'0.72rem',opacity:0.8,marginTop:'2px'}}>دج مقبوضة ✅</div>
            </div>
            <div>
              <div style={{fontSize:'2rem',fontWeight:'900',fontVariantNumeric:'tabular-nums',lineHeight:1,color:'rgba(255,255,255,0.7)'}}>{fmt(totalPending)}</div>
              <div style={{fontSize:'0.72rem',opacity:0.7,marginTop:'2px'}}>دج في الانتظار 🟡</div>
            </div>
          </div>
          {myPayments.length>0&&<div style={{fontSize:'0.72rem',opacity:0.75,borderTop:'1px solid rgba(255,255,255,0.2)',paddingTop:'0.625rem'}}>
            {myPayments.length} مهمة مسجلة · {myPayments.filter(p=>p.status==='paid').length} مدفوعة · مجموع: {fmt(totalEarned+totalPending)} دج
          </div>}
        </div>

        {overdue>0&&<div style={{background:`${B.danger}12`,border:`1px solid ${B.danger}33`,borderRadius:'1rem',padding:'0.875rem',display:'flex',gap:'0.75rem',alignItems:'center'}}>
          <span>⚠️</span><div><div style={{fontWeight:'700',color:B.danger,fontSize:'0.875rem'}}>{overdue} مهمة متأخرة</div><div style={{fontSize:'0.75rem',color:B.muted}}>خبر الأدمين</div></div>
        </div>}

        {/* Tabs */}
        <div style={{display:'flex',gap:'4px',background:B.card,padding:'3px',borderRadius:'1rem',border:`1px solid ${B.border}`}}>
          <button onClick={()=>setShowDone(false)} style={{flex:1,padding:'0.55rem',borderRadius:'0.75rem',border:'none',cursor:'pointer',fontWeight:'700',fontSize:'0.85rem',background:!showDone?roleColor:'transparent',color:!showDone?'white':B.muted,transition:'all 0.15s',display:'flex',flexDirection:'column',alignItems:'center',gap:'1px'}}>
            <span>{primaryStage?`${pStage?.icon} ${pStage?.label}`:'مهامي'}</span>
            <span style={{fontSize:'0.65rem',opacity:!showDone?0.85:0.6,fontWeight:'400'}}>{stageTasks.length} مهمة</span>
          </button>
          <button onClick={()=>setShowDone(true)} style={{flex:1,padding:'0.55rem',borderRadius:'0.75rem',border:'none',cursor:'pointer',fontWeight:'700',fontSize:'0.85rem',background:showDone?roleColor:'transparent',color:showDone?'white':B.muted,transition:'all 0.15s',display:'flex',flexDirection:'column',alignItems:'center',gap:'1px'}}>
            <span>✅ المنجزة</span>
            <span style={{fontSize:'0.65rem',opacity:showDone?0.85:0.6,fontWeight:'400'}}>{doneTasks.length} مهمة</span>
          </button>
        </div>

        {data.clients.length>1&&<div style={{display:'flex',gap:'0.375rem',overflowX:'auto',paddingBottom:'2px'}}>
          <button onClick={()=>setSelClient(null)} style={{padding:'0.3rem 0.75rem',borderRadius:'9999px',border:`1px solid ${!selClient?roleColor:B.border}`,background:!selClient?`${roleColor}15`:'transparent',color:!selClient?roleColor:B.muted,cursor:'pointer',fontSize:'0.75rem',fontWeight:'700',whiteSpace:'nowrap'}}>الكل</button>
          {data.clients.map(c=>(<button key={c.id} onClick={()=>setSelClient(selClient===c.id?null:c.id)} style={{padding:'0.3rem 0.75rem',borderRadius:'9999px',border:`1px solid ${selClient===c.id?c.color:B.border}`,background:selClient===c.id?`${c.color}15`:'transparent',color:selClient===c.id?c.color:B.muted,cursor:'pointer',fontSize:'0.75rem',fontWeight:'700',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:'4px'}}>
            <div style={{width:6,height:6,borderRadius:'50%',background:c.color}}/>{c.name}
          </button>))}
        </div>}

        {displayTasks.length===0
          ?<div style={{background:B.card,border:`1px solid ${B.border}`,borderRadius:'1.25rem',padding:'3rem',textAlign:'center'}}>
            <div style={{fontSize:'2.5rem',marginBottom:'0.75rem'}}>{showDone?'📭':'🎉'}</div>
            <div style={{fontWeight:'700',color:B.text}}>{showDone?'ما كاينش مهام منجزة بعد':'ما كاينش مهام دروك!'}</div>
          </div>
          :<div style={{display:'flex',flexDirection:'column',gap:'0.75rem'}}>
            {displayTasks.map(task=>{
              const cl=data.clients.find(c=>c.id===task.clientId);
              const ct=CTYPES.find(c=>c.id===task.contentType);
              const stageInfo=TASK_STAGES.find(s=>s.id===task.stage);
              const cc=data.comments.filter(c=>c.taskId===task.id).length;
              const od=isOverdue(task.dueDate);const td=isToday(task.dueDate);
              const si=TASK_STAGES.findIndex(s=>s.id===task.stage);
              const next=si<TASK_STAGES.length-1?TASK_STAGES[si+1]:null;
              const isPending=!!task.pendingStage;
              const isDone=task.stage==='done'||task.stage==='post';
              const taskPay=myPayments.find(p=>p.taskId===task.id);
              return(
                <div key={task.id} style={{background:B.card,borderRadius:'1.25rem',border:`1px solid ${od&&!isPending?B.danger+'55':isPending?B.warning+'55':B.border}`,overflow:'hidden'}}>
                  <div style={{height:'3px',background:isPending?B.warning:stageInfo?.color||B.border}}/>
                  <div style={{padding:'1rem'}}>
                    <div style={{display:'flex',alignItems:'flex-start',gap:'0.625rem',marginBottom:'0.5rem'}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div onClick={()=>setSelTask(task)} style={{fontWeight:'800',color:B.text,fontSize:'0.95rem',lineHeight:1.4,cursor:'pointer',marginBottom:'3px'}}>{task.title}</div>
                        <div style={{display:'flex',gap:'0.375rem',alignItems:'center',flexWrap:'wrap'}}>
                          {cl&&<div style={{display:'flex',alignItems:'center',gap:'3px'}}><div style={{width:6,height:6,borderRadius:'50%',background:cl.color||B.accent}}/><span style={{fontSize:'0.75rem',fontWeight:'700',color:cl.color||B.accent}}>{cl.name}</span></div>}
                          {showDone&&stageInfo&&<span style={{fontSize:'0.68rem',padding:'1px 6px',borderRadius:'9999px',background:`${stageInfo.color}15`,color:stageInfo.color,fontWeight:'700'}}>{stageInfo.icon} {stageInfo.label}</span>}
                          {ct&&<span style={{fontSize:'0.72rem',color:B.muted}}>{ct.i}</span>}
                        </div>
                      </div>
                      {cc>0&&<div style={{display:'flex',alignItems:'center',gap:'3px',padding:'3px 7px',background:B.inputBg,borderRadius:'9999px',flexShrink:0}}><Ic n="message" size={12}/><span style={{fontSize:'0.68rem',fontWeight:'700',color:B.muted}}>{cc}</span></div>}
                    </div>
                    <div style={{display:'flex',gap:'0.375rem',flexWrap:'wrap',marginBottom:'0.5rem'}}>
                      {task.shootDate&&<div style={{fontSize:'0.72rem',color:B.info,background:`${B.info}12`,padding:'3px 8px',borderRadius:'9999px'}}>📷 {fmtD(task.shootDate)}</div>}
                      {task.dueDate&&<div style={{fontSize:'0.72rem',color:od?B.danger:td?B.warning:B.muted,background:`${od?B.danger:td?B.warning:B.border}15`,padding:'3px 8px',borderRadius:'9999px',fontWeight:od||td?'700':'400'}}>📅 {od?'⚠️ متأخر':td?'اليوم':fmtD(task.dueDate)}</div>}
                      {task.link&&<a href={task.link} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{fontSize:'0.72rem',color:B.info,background:`${B.info}12`,padding:'3px 8px',borderRadius:'9999px',textDecoration:'none'}}>🔗 ↗</a>}
                    </div>
                    {taskPay&&<div style={{fontSize:'0.75rem',padding:'4px 10px',borderRadius:'9999px',background:taskPay.status==='paid'?`${B.success}15`:`${B.warning}15`,color:taskPay.status==='paid'?B.success:B.warning,fontWeight:'700',display:'inline-block',marginBottom:'0.5rem'}}>
                      💰 {fmt(taskPay.amount)} دج — {taskPay.status==='paid'?'مدفوعة ✅':'في الانتظار 🟡'}
                    </div>}
                    <div style={{display:'flex',flexDirection:'column',gap:'0.375rem'}}>
                      {isPending
                        ?<div style={{padding:'0.625rem 0.875rem',borderRadius:'0.875rem',background:`${B.warning}12`,border:`1px solid ${B.warning}33`,display:'flex',alignItems:'center',gap:'0.5rem',justifyContent:'center'}}>
                          <span>🟡</span><div><div style={{fontSize:'0.78rem',fontWeight:'700',color:B.warning}}>في انتظار موافقة الأدمين</div><div style={{fontSize:'0.65rem',color:B.muted}}>→ {TASK_STAGES.find(s=>s.id===task.pendingStage)?.label}</div></div>
                        </div>
                        :next&&!isDone
                          ?<button onClick={()=>requestMove(task.id,next.id)} style={{width:'100%',padding:'0.75rem',borderRadius:'0.875rem',border:'none',cursor:'pointer',fontWeight:'800',fontSize:'0.9rem',display:'flex',alignItems:'center',justifyContent:'center',gap:'0.5rem',background:`linear-gradient(135deg,${next.color},${next.color}cc)`,color:'white',boxShadow:`0 4px 12px ${next.color}44`}}>
                            ✓ انتهيت <span style={{opacity:0.85,fontSize:'0.78rem'}}>→ {next.label}</span>
                          </button>
                          :isDone&&<div style={{padding:'0.5rem',borderRadius:'0.75rem',background:`${B.success}10`,border:`1px solid ${B.success}22`,textAlign:'center',fontSize:'0.78rem',color:B.success,fontWeight:'700'}}>✅ مكتملة</div>
                      }
                      <button onClick={()=>setSelTask(task)} style={{width:'100%',padding:'0.45rem',borderRadius:'0.875rem',border:`1px solid ${B.border}`,background:'transparent',color:B.muted,cursor:'pointer',fontSize:'0.78rem',fontWeight:'600',display:'flex',alignItems:'center',justifyContent:'center',gap:'0.4rem'}}>
                        💬 حائط الفريق{cc>0?` (${cc})`:''}
                      </button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        }

        {myPayments.length>0&&(
          <div style={{background:B.card,border:`1px solid ${B.border}`,borderRadius:'1.25rem',padding:'1rem'}}>
            <div style={{fontWeight:'800',color:B.text,fontSize:'0.9rem',marginBottom:'0.75rem'}}>📊 سجل أرباحي</div>
            <div style={{display:'flex',flexDirection:'column',gap:'0.375rem',maxHeight:'220px',overflowY:'auto'}}>
              {myPayments.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).map(p=>(
                <div key={p.id} style={{display:'flex',alignItems:'center',gap:'0.5rem',padding:'0.5rem 0.625rem',background:B.inputBg,borderRadius:'0.75rem'}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:'0.8rem',fontWeight:'600',color:B.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.taskTitle}</div>
                    <div style={{fontSize:'0.65rem',color:B.muted}}>{fmtD(p.createdAt)}{p.note?` · ${p.note}`:''}</div>
                  </div>
                  <span style={{fontWeight:'800',color:p.status==='paid'?B.success:B.warning,fontVariantNumeric:'tabular-nums'}}>{fmt(p.amount)} دج</span>
                  <span style={{fontSize:'0.65rem',padding:'2px 6px',borderRadius:'9999px',background:p.status==='paid'?`${B.success}15`:`${B.warning}15`,color:p.status==='paid'?B.success:B.warning,fontWeight:'700',whiteSpace:'nowrap'}}>{p.status==='paid'?'✅':'🟡'}</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {payModal&&(<Modal onClose={()=>setPayModal(null)} title="شحال خدمت على هاذ المهمة؟">
        <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
          <div style={{padding:'0.75rem',background:B.inputBg,borderRadius:'0.75rem',fontSize:'0.85rem',color:B.text,fontWeight:'600'}}>📋 {payModal.taskTitle}</div>
          <Field label="💰 المبلغ الذي خدمته (دج)" hint="اختياري">
            <input type="number" value={payAmt} onChange={e=>setPayAmt(e.target.value)} placeholder="0 دج" style={INP} autoFocus/>
          </Field>
          {payAmt>0&&<div style={{padding:'0.75rem',background:`${roleColor}15`,border:`1px solid ${roleColor}33`,borderRadius:'0.875rem',fontWeight:'800',color:roleColor,textAlign:'center',fontSize:'1.1rem'}}>{fmt(Number(payAmt))} دج</div>}
          <Field label="ملاحظة (اختياري)">
            <input value={payNote} onChange={e=>setPayNote(e.target.value)} placeholder="مثال: مع أوفرتايم..." style={INP}/>
          </Field>
          <div style={{fontSize:'0.75rem',color:B.muted,padding:'0.5rem 0.75rem',background:`${B.info}10`,borderRadius:'0.75rem'}}>💡 المبلغ يروح للأدمين باش يخلصلك</div>
          <div style={{display:'flex',gap:'0.5rem'}}>
            <button onClick={confirmDone} style={{flex:1,padding:'0.875rem',borderRadius:'0.75rem',background:B.accent,color:'white',fontWeight:'700',border:'none',cursor:'pointer'}}>✓ انتهيت وأرسل</button>
            <button onClick={()=>setPayModal(null)} style={{padding:'0.875rem 1rem',borderRadius:'0.75rem',border:`1px solid ${B.border}`,background:'transparent',color:B.muted,cursor:'pointer',fontWeight:'700'}}>إلغاء</button>
          </div>
        </div>
      </Modal>)}

      {freshTask&&<TaskDetail task={freshTask} data={data} onClose={()=>setSelTask(null)} onUpdate={(patch,msg)=>updTask(freshTask.id,patch,msg)} onDelete={null} onMove={null} onAddComment={addComment} isAdmin={false} me={me}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
