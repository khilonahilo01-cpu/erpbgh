function Login({data,onLogin}){
  const[role,setRole]=useState('admin');const[mid,setMid]=useState(data.members[0]?.id||'');
  const[pw,setPw]=useState('');const[err,setErr]=useState('');const[loading,setLoading]=useState(false);
  const go=async()=>{setErr('');setLoading(true);
    try{if(role==='admin'){if(hash(pw)===data.adminPassword)onLogin({role:'admin'});else setErr('كلمة السر غالطة');}
      else{const m=data.members.find(x=>x.id===mid);if(!m)return setErr('اختار عضو');if(!m.password)return setErr('ما عندوش كلمة سر');if(hash(pw)===m.password)onLogin({role:'member',memberId:mid});else setErr('كلمة السر غالطة');}}
    finally{setLoading(false);}};
  return(<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:B.bg,padding:'1.5rem',position:'relative'}}><button onClick={toggleTheme} style={{position:'fixed',top:'1rem',left:'1rem',background:B.card,border:`1px solid ${B.border}`,borderRadius:'9999px',padding:'0.4rem 0.75rem',cursor:'pointer',display:'flex',alignItems:'center',gap:'0.4rem',color:B.muted,fontSize:'0.8rem'}}><Ic n={_theme==='dark'?'sun':'moon'} size={14}/></button><div style={{width:'100%',maxWidth:'22rem',display:'flex',flexDirection:'column',gap:'1.5rem',alignItems:'center'}}><div style={{width:64,height:64,background:B.accent,borderRadius:'18px',display:'grid',placeItems:'center',boxShadow:`0 8px 24px ${B.accent}44`}}><Ic n="layout" size={30} color="white"/></div><div style={{textAlign:'center'}}><h1 style={{fontSize:'1.75rem',fontWeight:'900',color:B.text}}>ERP الوكالة</h1><p style={{fontSize:'0.875rem',color:B.muted}}>نظام إدارة متكامل</p></div><div style={{background:B.card,borderRadius:'1.25rem',border:`1px solid ${B.border}`,padding:'1.5rem',width:'100%',display:'flex',flexDirection:'column',gap:'1rem'}}><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'4px',padding:'3px',background:B.inputBg,borderRadius:'0.75rem'}}>{[{v:'admin',l:'أدمين'},{v:'member',l:'عضو'}].map(r=>(<button key={r.v} onClick={()=>{setRole(r.v);setErr('');setPw('');}} style={{padding:'0.5rem',borderRadius:'0.5rem',border:'none',cursor:'pointer',fontWeight:'700',fontSize:'0.875rem',background:role===r.v?B.accent:'transparent',color:role===r.v?'white':B.muted,transition:'all 0.15s'}}>{r.l}</button>))}</div>{role==='member'&&(data.members.length===0?<div style={{fontSize:'0.8rem',color:B.warning,padding:'0.5rem',background:`${B.warning}15`,borderRadius:'0.5rem',textAlign:'center'}}>الأدمين لازم يزيدك أول</div>:<Field label="اسمك"><select value={mid} onChange={e=>setMid(e.target.value)} style={INP}><option value="">— اختار —</option>{data.members.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</select></Field>)}<Field label="كلمة السر"><PwInput value={pw} onChange={setPw} placeholder="كلمة السر" onEnter={go}/></Field>{err&&<div style={{fontSize:'0.75rem',color:B.danger,fontWeight:'700',padding:'0.4rem 0.75rem',background:`${B.danger}15`,borderRadius:'0.5rem'}}>{err}</div>}<button onClick={go} disabled={loading} style={{width:'100%',padding:'0.875rem',borderRadius:'0.75rem',background:B.accent,color:'white',fontWeight:'700',border:'none',cursor:'pointer',opacity:loading?0.7:1,display:'flex',alignItems:'center',justifyContent:'center',gap:'0.5rem'}}>{loading&&<span className="spin" style={{display:'inline-block'}}><Ic n="loader" size={16} color="white"/></span>}دخول</button></div></div></div>);
}

// ─── MAIN APP ─────────────────────────────────────────────
function App(){
  const[data,setData]=useState(EMPTY);const[loading,setLoading]=useState(true);
  const[session,setSession]=useState(null);const[toast,setToast]=useState(null);
  useEffect(()=>{DB.load().then(d=>{setData(d);setLoading(false);});const s=localStorage.getItem('_erp_s');if(s){try{setSession(JSON.parse(s));}catch(e){}};},[]);
  const persist=useCallback(async next=>{setData(next);await DB.save(next);},[]);
  const showToast=(msg,type='success')=>{setToast({msg,type});setTimeout(()=>setToast(null),3000);};
  const logout=()=>{localStorage.removeItem('_erp_s');setSession(null);};
  if(loading)return(<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:B.bg,flexDirection:'column',gap:'1rem'}}><div style={{width:60,height:60,background:B.accent,borderRadius:'16px',display:'grid',placeItems:'center'}}><Ic n="layout" size={28} color="white"/></div><div style={{color:B.muted,fontSize:'0.875rem'}}>جاري التحميل...</div></div>);
  if(!data.adminPassword)return <Setup onSetup={pw=>{const next={...data,adminPassword:hash(pw)};persist(next);const s={role:'admin'};setSession(s);localStorage.setItem('_erp_s',JSON.stringify(s));}}/>;
  if(!session)return <Login data={data} onLogin={s=>{setSession(s);localStorage.setItem('_erp_s',JSON.stringify(s));}}/>;
  const me=session.role==='member'?data.members.find(m=>m.id===session.memberId):null;
  return(<div style={{minHeight:'100vh',background:B.bg}}>{session.role==='admin'?<AdminApp data={data} persist={persist} showToast={showToast} logout={logout}/>:<MemberApp data={data} persist={persist} showToast={showToast} logout={logout} me={me} addMemberPayment={(p)=>{persist({...data,memberPayments:[{id:uid(),...p,createdAt:new Date().toISOString()},...(data.memberPayments||[])]});}}/>}<Toast t={toast}/></div>);
}

// ─── ADMIN APP SHELL ──────────────────────────────────────
function AdminApp({data,persist,showToast,logout}){
  const[mod,setMod]=useState('dash');
  const[selClient,setSelClient]=useState(null); // for task board

  const logAct=(action,detail,memberId=null,memberName='أدمين')=>
    [{id:uid(),action,detail,memberId,memberName,createdAt:new Date().toISOString()},...(data.activity||[]).slice(0,199)];

  // ── shared mutators ──
  const addMember=(name,role,pw,color)=>{persist({...data,members:[...data.members,{id:uid(),name,role,password:hash(pw),color}],activity:logAct('add_member',`أضاف عضو: ${name}`)});showToast('تم إضافة العضو ✅');};
  const updMember=(id,p)=>persist({...data,members:data.members.map(m=>m.id===id?{...m,...p}:m)});
  const delMember=id=>{if(!confirm('متأكد؟'))return;persist({...data,members:data.members.filter(m=>m.id!==id)});showToast('تم الحذف');};

  // CRM
  const addContact=c=>{const next={id:uid(),...c,createdAt:new Date().toISOString()};persist({...data,contacts:[next,...data.contacts],activity:logAct('add_contact',`Prospect جديد: ${c.name}`)});showToast('تم إضافة الزبون المحتمل ✅');};
  const updContact=(id,p)=>persist({...data,contacts:data.contacts.map(c=>c.id===id?{...c,...p}:c)});
  const delContact=id=>{if(!confirm('متأكد؟'))return;persist({...data,contacts:data.contacts.filter(c=>c.id!==id)});showToast('تم الحذف');};
  const moveContact=(id,stage)=>{
    const c=data.contacts.find(x=>x.id===id);
    if(stage==='won'){
      // Convert to active client
      const client={id:uid(),name:c.name,phone:c.phone||'',email:c.email||'',color:COLORS[data.clients.length%COLORS.length],services:[],monthlyValue:0,startDate:todayStr(),renewalDate:'',status:'active',notes:'',contactId:id};
      persist({...data,contacts:data.contacts.map(x=>x.id===id?{...x,stage}:x),clients:[...data.clients,client],activity:logAct('won_deal',`ربح صفقة: ${c.name}`)});
      showToast('🏆 تم الربح! الزبون أصبح نشطاً');
    } else {
      persist({...data,contacts:data.contacts.map(x=>x.id===id?{...x,stage}:x),activity:logAct('move_contact',`${c.name} → ${DEAL_STAGES.find(s=>s.id===stage)?.label}`)});
    }
  };

  // Clients
  const addClient=c=>{persist({...data,clients:[{id:uid(),...c,createdAt:new Date().toISOString()},...data.clients],activity:logAct('add_client',`زبون جديد: ${c.name}`)});showToast('تم إضافة الزبون ✅');};
  const updClient=(id,p)=>persist({...data,clients:data.clients.map(c=>c.id===id?{...c,...p}:c)});
  const delClient=id=>{if(!confirm('متأكد؟ هذا سيحذف كل المهام والفواتير'))return;persist({...data,clients:data.clients.filter(c=>c.id!==id),tasks:data.tasks.filter(t=>t.clientId!==id),invoices:data.invoices.filter(i=>i.clientId!==id)});showToast('تم الحذف');};

  // Tasks
  const addTask=task=>{const cl=data.clients.find(c=>c.id===task.clientId);persist({...data,tasks:[{id:uid(),...task,createdAt:new Date().toISOString()},...data.tasks],activity:logAct('add_task',`مهمة جديدة: ${task.title} ← ${cl?.name||''}`)});showToast('تم إضافة المهمة ✅');};
  const updTask=(id,p,msg=null)=>{const act=msg?logAct('update_task',msg):data.activity;persist({...data,tasks:data.tasks.map(t=>t.id===id?{...t,...p}:t),activity:act});};
  const delTask=id=>{if(!confirm('متأكد؟'))return;persist({...data,tasks:data.tasks.filter(t=>t.id!==id),comments:data.comments.filter(c=>c.taskId!==id)});showToast('تم الحذف');};

  // Member requests move (sets pendingStage, notifies admin)
  const requestMoveTask=(taskId,newStage,memberName)=>{
    const t=data.tasks.find(x=>x.id===taskId);
    const to=TASK_STAGES.find(s=>s.id===newStage)?.label;
    const c={id:uid(),taskId,memberId:null,memberName,content:`🟡 ${memberName} انتهى — في انتظار موافقة الأدمين للانتقال لـ ${to}`,createdAt:new Date().toISOString()};
    const act=logAct('request_move',`${memberName} طلب: ${t?.title} → ${to}`);
    persist({...data,tasks:data.tasks.map(x=>x.id===taskId?{...x,pendingStage:newStage}:x),comments:[...data.comments,c],activity:act});
  };

  // Approve pending stage
  const approveTask=(id)=>{
    const t=data.tasks.find(x=>x.id===id);if(!t||!t.pendingStage)return;
    const stageName=TASK_STAGES.find(s=>s.id===t.pendingStage)?.label;
    const c={id:uid(),taskId:id,memberId:'admin',memberName:'أدمين',content:`✅ تمت الموافقة — انتقلت لـ ${stageName}`,createdAt:new Date().toISOString()};
    const act=logAct('approve_task',`الأدمين وافق: ${t.title} → ${stageName}`);
    persist({...data,tasks:data.tasks.map(x=>x.id===id?{...x,stage:t.pendingStage,pendingStage:null}:x),comments:[...data.comments,c],activity:act});
    showToast(`✅ تمت الموافقة — انتقلت لـ ${stageName}`);
  };

  // Reject pending stage
  const rejectTask=(id,reason='')=>{
    const t=data.tasks.find(x=>x.id===id);if(!t)return;
    const c={id:uid(),taskId:id,memberId:'admin',memberName:'أدمين',content:`↩️ مرجّعة: ${reason||'راجع الشغل وأعد المحاولة'}`,createdAt:new Date().toISOString()};
    const act=logAct('reject_task',`الأدمين رجّع: ${t.title}`);
    persist({...data,tasks:data.tasks.map(x=>x.id===id?{...x,pendingStage:null}:x),comments:[...data.comments,c],activity:act});
    showToast('↩️ تم الإرجاع');
  };
  const addComment=(taskId,memberId,memberName,content,type='comment')=>{const c={id:uid(),taskId,memberId,memberName,content,type,createdAt:new Date().toISOString()};persist({...data,comments:[...data.comments,c],activity:logAct('comment',`${memberName}: ${content.slice(0,40)}`,memberId,memberName)});};

  // Invoices
  const addInvoice=inv=>{persist({...data,invoices:[{id:uid(),...inv,createdAt:new Date().toISOString()},...data.invoices],activity:logAct('add_invoice',`فاتورة جديدة: ${fmt(inv.amount)} دج`)});showToast('تم إضافة الفاتورة ✅');};
  const updInvoice=(id,p)=>persist({...data,invoices:data.invoices.map(i=>i.id===id?{...i,...p}:i)});
  const delInvoice=id=>{if(!confirm('متأكد؟'))return;persist({...data,invoices:data.invoices.filter(i=>i.id!==id)});showToast('تم الحذف');};

  // Expenses
  const addExpense=exp=>{persist({...data,expenses:[{id:uid(),...exp,createdAt:new Date().toISOString()},...data.expenses]});showToast('تم تسجيل المصروف ✅');};
  const delExpense=id=>{if(!confirm('متأكد؟'))return;persist({...data,expenses:data.expenses.filter(e=>e.id!==id)});showToast('تم الحذف');};

  const MODS=[
    {id:'dash',l:'الرئيسية',ic:'layout'},
    {id:'crm',l:'CRM',ic:'crm'},
    {id:'clients',l:'الزبائن',ic:'building'},
    {id:'tasks',l:'المهام',ic:'kanban'},
    {id:'services',l:'SERVICE',ic:'star'},
    {id:'invoices',l:'الفواتير',ic:'invoice'},
    {id:'reports',l:'تقارير',ic:'chart'},
    {id:'team',l:'الفريق',ic:'users'},
    {id:'settings',l:'⚙️ إعدادات',ic:'lock'},
  ];

  const addMemberPayment=p=>{persist({...data,memberPayments:[{id:uid(),...p,createdAt:new Date().toISOString()},...(data.memberPayments||[])]});};
  const updMemberPayment=(id,patch)=>persist({...data,memberPayments:(data.memberPayments||[]).map(p=>p.id===id?{...p,...patch}:p)});
  const delMemberPayment=id=>persist({...data,memberPayments:(data.memberPayments||[]).filter(p=>p.id!==id)});
  const changeAdminPw=(newPw)=>{persist({...data,adminPassword:hash(newPw)});showToast('تم تغيير كلمة السر ✅');};
  const changeMemberPw=(id,newPw)=>{persist({...data,members:data.members.map(m=>m.id===id?{...m,password:hash(newPw)}:m)});showToast('تم تغيير كلمة السر ✅');};
  const addService=s=>{persist({...data,services:[{id:uid(),...s,createdAt:new Date().toISOString()},...(data.services||[])]});showToast('تم الإضافة ✅');};
  const updService=(id,p)=>persist({...data,services:(data.services||[]).map(s=>s.id===id?{...s,...p}:s)});
  const delService=id=>{if(!confirm('متأكد؟'))return;persist({...data,services:(data.services||[]).filter(s=>s.id!==id)});showToast('تم الحذف');};

  if(selClient){
    return <TaskBoard client={selClient} data={data} onBack={()=>setSelClient(null)}
      addTask={addTask} updTask={updTask} delTask={delTask} addComment={addComment}
      approveTask={approveTask} rejectTask={rejectTask} requestMoveTask={requestMoveTask}
      addMemberPayment={addMemberPayment}
      showToast={showToast} isAdmin={true} logout={logout} me={null}/>;
  }

  return(
    <div style={{fontFamily:"'Cairo',sans-serif"}}>
      {/* Top Header */}
      <div style={{background:B.nav,borderBottom:`1px solid ${_theme==='dark'?'#333':'#e4e4e7'}`,position:'sticky',top:0,zIndex:30}}>
        <div style={{maxWidth:'90rem',margin:'0 auto',padding:'0 1rem',display:'flex',alignItems:'center',justifyContent:'space-between',height:'52px',gap:'1rem'}}>
          <div style={{display:'flex',alignItems:'center',gap:'0.75rem'}}>
            <div style={{width:32,height:32,background:B.accent,borderRadius:'9px',display:'grid',placeItems:'center',flexShrink:0}}><Ic n="layout" size={16} color="white"/></div>
            <span style={{fontWeight:'800',color:'white',fontSize:'0.95rem'}}>ERP الوكالة</span>
          </div>
          {/* Nav */}
          <nav style={{display:'flex',gap:'0.125rem',overflowX:'auto'}}>
            {MODS.map(m=>(
              <button key={m.id} onClick={()=>setMod(m.id)}
                style={{display:'flex',alignItems:'center',gap:'0.35rem',padding:'0.5rem 0.75rem',borderRadius:'0.5rem',border:'none',cursor:'pointer',fontWeight:'700',fontSize:'0.8rem',whiteSpace:'nowrap',background:mod===m.id?B.accent:'transparent',color:mod===m.id?'white':'rgba(255,255,255,0.6)',transition:'all 0.15s'}}>
                <Ic n={m.ic} size={14} color={mod===m.id?'white':'rgba(255,255,255,0.6)'}/>{m.l}
              </button>
            ))}
          </nav>
          <div style={{display:'flex',gap:'0.5rem',alignItems:'center',flexShrink:0}}>
            <button onClick={toggleTheme} style={{background:'rgba(255,255,255,0.1)',border:'none',borderRadius:'9999px',padding:'0.35rem 0.625rem',cursor:'pointer',display:'flex',color:'rgba(255,255,255,0.7)'}}><Ic n={_theme==='dark'?'sun':'moon'} size={14} color="rgba(255,255,255,0.7)"/></button>
            <button onClick={logout} style={{display:'flex',alignItems:'center',gap:'0.35rem',padding:'0.35rem 0.75rem',borderRadius:'9999px',border:'1px solid rgba(255,255,255,0.2)',background:'transparent',color:'rgba(255,255,255,0.7)',cursor:'pointer',fontSize:'0.75rem'}}><Ic n="logout" size={13} color="rgba(255,255,255,0.7)"/>خروج</button>
          </div>
        </div>
      </div>

      <div style={{maxWidth:'90rem',margin:'0 auto',padding:'1.25rem 1rem'}}>
        {mod==='dash'&&<Dashboard data={data} setMod={setMod} onSelectClient={setSelClient} approveTask={approveTask} rejectTask={rejectTask}/>}
        {mod==='crm'&&<CRMModule data={data} addContact={addContact} updContact={updContact} delContact={delContact} moveContact={moveContact}/>}
        {mod==='clients'&&<ClientsModule data={data} addClient={addClient} updClient={updClient} delClient={delClient} onSelectClient={setSelClient}/>}
        {mod==='tasks'&&<TasksOverview data={data} onSelectClient={setSelClient}/>}
        {mod==='services'&&<ServiceModule data={data} addService={addService} updService={updService} delService={delService}/>}
        {mod==='invoices'&&<InvoicesModule data={data} addInvoice={addInvoice} updInvoice={updInvoice} delInvoice={delInvoice} addExpense={addExpense} delExpense={delExpense}/>}
        {mod==='reports'&&<ReportsModule data={data}/>}
        {mod==='team'&&<TeamModule data={data} addMember={addMember} updMember={updMember} delMember={delMember} payments={data.memberPayments||[]} updPayment={updMemberPayment} delPayment={delMemberPayment}/>}
        {mod==='settings'&&<SettingsModule data={data} changeAdminPw={changeAdminPw} changeMemberPw={changeMemberPw}/>}
      </div>
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────
function Dashboard({data,setMod,onSelectClient,approveTask,rejectTask}){
  const thisMonth=new Date();thisMonth.setDate(1);thisMonth.setHours(0,0,0,0);
  const rev=data.invoices.filter(i=>i.status==='paid'&&new Date(i.paidAt||i.createdAt)>=thisMonth).reduce((s,i)=>s+Number(i.amount),0);
  const pending=data.invoices.filter(i=>i.status==='pending').reduce((s,i)=>s+Number(i.amount),0);
  const overdueTasks=data.tasks.filter(t=>t.stage!=='done'&&isOverdue(t.dueDate));
  const activeTasks=data.tasks.filter(t=>t.stage!=='done').length;
  const wonThisMonth=data.contacts.filter(c=>c.stage==='won').length;
  const pipelineValue=data.contacts.filter(c=>!['won','lost'].includes(c.stage)).reduce((s,c)=>s+Number(c.value||0),0);
  const pendingApprovals=data.tasks.filter(t=>t.pendingStage);
  const[rejectModal,setRejectModal]=useState(null); // taskId
  const[rejectReason,setRejectReason]=useState('');

  // Renewals soon
  const renewals=data.clients.filter(c=>{const d=daysUntil(c.renewalDate);return d!==null&&d<=30&&d>=0;}).sort((a,b)=>daysUntil(a.renewalDate)-daysUntil(b.renewalDate));

  return(
    <div style={{display:'flex',flexDirection:'column',gap:'1.25rem'}}>
      {/* KPIs */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'0.75rem'}}>
        <StatCard label="إيرادات الشهر" value={`${fmt(rev)} دج`} ic="trending" color={B.success}/>
        <StatCard label="فواتير معلقة" value={`${fmt(pending)} دج`} ic="invoice" color={B.warning}/>
        <StatCard label="مهام نشطة" value={activeTasks} ic="kanban" color={B.info}/>
        <StatCard label="متأخرة" value={overdueTasks.length} ic="alert" color={B.danger}/>
      </div>

      {/* Pending approvals — priority alert */}
      {pendingApprovals.length>0&&(
        <div style={{background:`${B.warning}12`,border:`1px solid ${B.warning}44`,borderRadius:'1rem',padding:'1rem'}}>
          <div style={{fontWeight:'800',color:B.warning,fontSize:'0.9rem',marginBottom:'0.625rem',display:'flex',alignItems:'center',gap:'0.5rem'}}>
            🟡 في انتظار موافقتك ({pendingApprovals.length})
          </div>
          {pendingApprovals.map(t=>{
            const cl=data.clients.find(c=>c.id===t.clientId);
            const from=TASK_STAGES.find(s=>s.id===t.stage);
            const to=TASK_STAGES.find(s=>s.id===t.pendingStage);
            const members=data.members.filter(m=>(t.assignees||[]).includes(m.id));
            return(
              <div key={t.id} style={{display:'flex',alignItems:'center',gap:'0.75rem',padding:'0.625rem 0',borderBottom:`1px solid ${B.warning}22`}}>
                <div style={{display:'flex',gap:'-4px'}}>
                  {members.slice(0,2).map((m,i)=><div key={m.id} style={{marginRight:i>0?'-6px':'0'}}><Av name={m.name} color={m.color} size={28} fs={10}/></div>)}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:'700',color:B.text,fontSize:'0.85rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.title}</div>
                  <div style={{fontSize:'0.72rem',color:B.muted}}>{cl?.name} · {from?.icon} {from?.label} → {to?.icon} {to?.label}</div>
                </div>
                <div style={{display:'flex',gap:'0.375rem',flexShrink:0}}>
                  <button onClick={()=>approveTask(t.id)}
                    style={{padding:'0.35rem 0.75rem',borderRadius:'0.5rem',border:`1px solid ${B.success}44`,background:`${B.success}15`,color:B.success,cursor:'pointer',fontSize:'0.78rem',fontWeight:'700'}}>
                    ✅ قبل
                  </button>
                  <button onClick={()=>{setRejectModal(t.id);setRejectReason('');}}
                    style={{padding:'0.35rem 0.75rem',borderRadius:'0.5rem',border:`1px solid ${B.danger}44`,background:`${B.danger}12`,color:B.danger,cursor:'pointer',fontSize:'0.78rem',fontWeight:'700'}}>
                    ↩️ ارجع
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Reject modal */}
      {rejectModal&&(
        <Modal onClose={()=>setRejectModal(null)} title="سبب الإرجاع">
          <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
            <Field label="ملاحظة للعضو (اختياري)">
              <textarea value={rejectReason} onChange={e=>setRejectReason(e.target.value)}
                placeholder="مثال: راجع السكريبت وأعد الصياغة..." style={{...INP,height:80,resize:'none'}} autoFocus/>
            </Field>
            <div style={{display:'flex',gap:'0.5rem'}}>
              <button onClick={()=>{rejectTask(rejectModal,rejectReason);setRejectModal(null);setRejectReason('');}}
                style={{flex:1,padding:'0.75rem',borderRadius:'0.75rem',background:B.danger,color:'white',fontWeight:'700',border:'none',cursor:'pointer'}}>
                ↩️ ارجع المهمة
              </button>
              <button onClick={()=>setRejectModal(null)}
                style={{padding:'0.75rem 1rem',borderRadius:'0.75rem',border:`1px solid ${B.border}`,background:'transparent',color:B.muted,cursor:'pointer',fontWeight:'700'}}>
                إلغاء
              </button>
            </div>
          </div>
        </Modal>
      )}

      {/* Overdue tasks alert */}
      {overdueTasks.length>0&&(
        <div style={{background:`${B.danger}10`,border:`1px solid ${B.danger}33`,borderRadius:'1rem',padding:'1rem'}}>
          <div style={{fontWeight:'700',color:B.danger,fontSize:'0.875rem',marginBottom:'0.625rem'}}>⚠️ مهام متأخرة ({overdueTasks.length})</div>
          {overdueTasks.slice(0,3).map(t=>{
            const cl=data.clients.find(c=>c.id===t.clientId);
            const assignees=data.members.filter(m=>(t.assignees||[]).includes(m.id));
            return(<div key={t.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'0.375rem 0',borderBottom:`1px solid ${B.danger}15`,fontSize:'0.8rem'}}>
              <span><span style={{fontWeight:'600',color:B.text}}>{t.title}</span><span style={{color:B.muted}}> · {cl?.name}</span></span>
              <div style={{display:'flex',gap:'-4px'}}>{assignees.slice(0,3).map((m,i)=><div key={m.id} style={{marginLeft:'-6px'}}><Av name={m.name} color={m.color} size={22} fs={8}/></div>)}</div>
            </div>);
          })}
        </div>
      )}

      {/* Renewals */}
      {renewals.length>0&&(
        <div style={{background:`${B.warning}10`,border:`1px solid ${B.warning}33`,borderRadius:'1rem',padding:'1rem'}}>
          <div style={{fontWeight:'700',color:B.warning,fontSize:'0.875rem',marginBottom:'0.625rem'}}>🔄 تجديدات قريبة ({renewals.length})</div>
          {renewals.map(c=>{const d=daysUntil(c.renewalDate);return(<div key={c.id} style={{display:'flex',justifyContent:'space-between',fontSize:'0.8rem',padding:'0.25rem 0',borderBottom:`1px solid ${B.warning}15`}}><span style={{fontWeight:'600',color:B.text}}>{c.name}</span><span style={{color:d<=7?B.danger:B.warning,fontWeight:'700'}}>باقي {d} يوم — {fmtD(c.renewalDate)}</span></div>);})}
        </div>
      )}

      {/* Pipeline */}
      <div style={{background:B.card,border:`1px solid ${B.border}`,borderRadius:'1rem',padding:'1rem'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'0.875rem'}}>
          <div style={{fontWeight:'800',color:B.text,fontSize:'1rem'}}>Pipeline CRM</div>
          <div style={{fontSize:'0.8rem',color:B.muted,fontVariantNumeric:'tabular-nums'}}>قيمة: {fmt(pipelineValue)} دج</div>
        </div>
        <div style={{display:'flex',gap:'0.5rem',flexWrap:'wrap'}}>
          {DEAL_STAGES.filter(s=>!['won','lost'].includes(s.id)).map(s=>{const count=data.contacts.filter(c=>c.stage===s.id).length;return(<div key={s.id} style={{flex:1,minWidth:'80px',padding:'0.625rem',background:B.inputBg,borderRadius:'0.75rem',textAlign:'center',border:`1px solid ${B.border}`}}><div style={{fontSize:'1.1rem'}}>{s.icon}</div><div style={{fontWeight:'900',color:s.color,fontSize:'1.25rem'}}>{count}</div><div style={{fontSize:'0.7rem',color:B.muted}}>{s.label}</div></div>);})}
        </div>
      </div>

      {/* Active clients */}
      <div>
        <div style={{fontWeight:'800',color:B.text,fontSize:'1rem',marginBottom:'0.75rem'}}>الزبائن النشطون</div>
        {data.clients.filter(c=>c.status==='active').length===0
          ?<div style={{background:B.card,border:`1px solid ${B.border}`,borderRadius:'1rem',padding:'2rem',textAlign:'center',color:B.muted,fontSize:'0.875rem'}}>ما كاينش زبائن نشطون بعد — ابدا من CRM</div>
          :<div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'0.75rem'}}>
            {data.clients.filter(c=>c.status==='active').slice(0,6).map(c=>{
              const tasks=data.tasks.filter(t=>t.clientId===c.id);
              const done=tasks.filter(t=>t.stage==='done').length;
              const pct=tasks.length>0?Math.round(done/tasks.length*100):0;
              const od=tasks.filter(t=>t.stage!=='done'&&isOverdue(t.dueDate)).length;
              const inv=data.invoices.filter(i=>i.clientId===c.id&&i.status==='pending').reduce((s,i)=>s+Number(i.amount),0);
              return(<button key={c.id} onClick={()=>onSelectClient(c)} style={{background:B.card,border:`1px solid ${B.border}`,borderRadius:'1rem',padding:'0.875rem',cursor:'pointer',textAlign:'right',transition:'all 0.15s'}} onMouseEnter={e=>e.currentTarget.style.borderColor=c.color} onMouseLeave={e=>e.currentTarget.style.borderColor=B.border}>
                <div style={{display:'flex',alignItems:'center',gap:'0.5rem',marginBottom:'0.375rem'}}>
                  <div style={{width:8,height:8,borderRadius:'50%',background:c.color,flexShrink:0}}/>
                  <span style={{fontWeight:'700',color:B.text,fontSize:'0.875rem',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.name}</span>
                  {od>0&&<Badge label={`${od}⚠️`} color={B.danger}/>}
                </div>
                <div style={{fontSize:'0.72rem',color:B.muted,marginBottom:'0.375rem'}}>{tasks.length} مهمة · {done} مكتملة{inv>0?` · 🧾 ${fmt(inv)} دج`:''}</div>
                <div style={{height:3,background:B.border,borderRadius:2}}><div style={{height:'100%',width:`${pct}%`,background:c.color,borderRadius:2}}/></div>
              </button>);
            })}
          </div>
        }
      </div>
    </div>
  );
}

// ─── CRM MODULE ───────────────────────────────────────────
function CRMModule({data,addContact,updContact,delContact,moveContact}){
  const[view,setView]=useState('pipeline'); // pipeline | list
  const[showAdd,setShowAdd]=useState(false);
  const[selContact,setSelContact]=useState(null);

  return(
    <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'0.75rem'}}>
        <div>
          <h2 style={{fontWeight:'900',color:B.text,fontSize:'1.25rem'}}>CRM — خط الصفقات</h2>
          <p style={{fontSize:'0.75rem',color:B.muted}}>{data.contacts.length} زبون محتمل · {data.contacts.filter(c=>c.stage==='won').length} ربح · {data.contacts.filter(c=>c.stage==='lost').length} خسارة</p>
        </div>
        <div style={{display:'flex',gap:'0.5rem',alignItems:'center'}}>
          <div style={{display:'flex',gap:'3px',background:B.card,padding:'3px',borderRadius:'0.75rem',border:`1px solid ${B.border}`}}>
            {[{v:'pipeline',l:'Pipeline'},{v:'list',l:'قائمة'}].map(v=>(
              <button key={v.v} onClick={()=>setView(v.v)} style={{padding:'0.4rem 0.75rem',borderRadius:'0.5rem',border:'none',cursor:'pointer',fontWeight:'700',fontSize:'0.8rem',background:view===v.v?B.accent:'transparent',color:view===v.v?'white':B.muted,transition:'all 0.15s'}}>{v.l}</button>
            ))}
          </div>
          <button onClick={()=>setShowAdd(true)} style={{display:'flex',alignItems:'center',gap:'0.4rem',padding:'0.5rem 1rem',borderRadius:'9999px',background:B.accent,color:'white',fontWeight:'700',border:'none',cursor:'pointer',fontSize:'0.85rem'}}>
            <Ic n="plus" size={16} color="white"/> زيد Prospect
          </button>
        </div>
      </div>

      {view==='pipeline'
        ?<CRMPipeline data={data} moveContact={moveContact} onSelect={setSelContact}/>
        :<CRMList data={data} updContact={updContact} delContact={delContact} moveContact={moveContact} onSelect={setSelContact}/>
      }

      {showAdd&&<ContactForm onClose={()=>setShowAdd(false)} onSave={c=>{addContact(c);setShowAdd(false);}}/>}
      {selContact&&<ContactDetail contact={selContact} data={data} onClose={()=>setSelContact(null)} onUpdate={(id,p)=>{updContact(id,p);setSelContact({...selContact,...p});}} onMove={(id,s)=>{moveContact(id,s);setSelContact(null);}} onDelete={id=>{delContact(id);setSelContact(null);}}/>}
    </div>
  );
}

function CRMPipeline({data,moveContact,onSelect}){
  return(
    <div className="scroll-x">
      {DEAL_STAGES.map(stage=>{
        const contacts=data.contacts.filter(c=>c.stage===stage.id);
        const totalVal=contacts.reduce((s,c)=>s+Number(c.value||0),0);
        return(
          <div key={stage.id} style={{minWidth:'220px',maxWidth:'220px',display:'flex',flexDirection:'column',gap:'0.5rem'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0.375rem 0.25rem'}}>
              <div style={{display:'flex',alignItems:'center',gap:'0.5rem'}}>
                <span>{stage.icon}</span>
                <span style={{fontWeight:'700',color:B.text,fontSize:'0.875rem'}}>{stage.label}</span>
                <span style={{fontSize:'0.7rem',padding:'1px 6px',borderRadius:'9999px',background:`${stage.color}22`,color:stage.color,fontWeight:'700'}}>{contacts.length}</span>
              </div>
              {totalVal>0&&<span style={{fontSize:'0.65rem',color:B.muted}}>{fmt(totalVal)}</span>}
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:'0.5rem'}}>
              {contacts.map(c=>(
                <ContactCard key={c.id} contact={c} stages={DEAL_STAGES} onClick={()=>onSelect(c)} onMove={moveContact}/>
              ))}
              <div style={{height:4,background:`${stage.color}15`,borderRadius:2}}/>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function ContactCard({contact,stages,onClick,onMove}){
  const si=stages.findIndex(s=>s.id===contact.stage);
  const next=si<stages.length-1?stages[si+1]:null;
  const prev=si>0?stages[si-1]:null;
  const stage=stages[si];
  return(
    <div onClick={onClick} style={{background:B.card,border:`1px solid ${B.border}`,borderRadius:'0.875rem',padding:'0.875rem',cursor:'pointer',transition:'border-color 0.15s',borderTop:`3px solid ${stage?.color||B.border}`}} onMouseEnter={e=>e.currentTarget.style.borderColor=stage?.color||B.accent} onMouseLeave={e=>e.currentTarget.style.borderColor=B.border}>
      <div style={{fontWeight:'700',color:B.text,fontSize:'0.875rem',marginBottom:'0.25rem'}}>{contact.name}</div>
      {contact.company&&<div style={{fontSize:'0.72rem',color:B.muted,marginBottom:'0.25rem'}}>🏢 {contact.company}</div>}
      {contact.phone&&<div style={{fontSize:'0.72rem',color:B.muted,marginBottom:'0.375rem'}}>📱 {contact.phone}</div>}
      {contact.value>0&&<div style={{fontWeight:'700',color:B.accent,fontSize:'0.8rem',marginBottom:'0.375rem',fontVariantNumeric:'tabular-nums'}}>{fmt(contact.value)} دج</div>}
      <div style={{display:'flex',gap:'0.25rem',marginTop:'0.5rem'}} onClick={e=>e.stopPropagation()}>
        {prev&&!['won','lost'].includes(prev.id)&&(
          <button onClick={()=>onMove(contact.id,prev.id)} style={{flex:1,padding:'0.3rem',borderRadius:'0.5rem',border:`1px solid ${B.border}`,background:'transparent',color:B.muted,cursor:'pointer',fontSize:'0.68rem',display:'flex',alignItems:'center',justifyContent:'center',gap:'2px'}}>
            <Ic n="chevR" size={11}/>{prev.label}
          </button>
        )}
        {next&&(
          <button onClick={()=>onMove(contact.id,next.id)} style={{flex:1,padding:'0.3rem',borderRadius:'0.5rem',border:`1px solid ${next.color}44`,background:`${next.color}11`,color:next.color,cursor:'pointer',fontSize:'0.68rem',fontWeight:'700',display:'flex',alignItems:'center',justifyContent:'center',gap:'2px'}}>
            {next.label}<Ic n="chevL" size={11} color={next.color}/>
          </button>
        )}
      </div>
    </div>
  );
}

function CRMList({data,updContact,delContact,moveContact,onSelect}){
  const[search,setSearch]=useState('');const[fStage,setFStage]=useState('');
  const list=useMemo(()=>data.contacts.filter(c=>{
    if(fStage&&c.stage!==fStage)return false;
    if(search&&!c.name.toLowerCase().includes(search.toLowerCase())&&!(c.company||'').toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  }),[data.contacts,fStage,search]);
  return(
    <div style={{display:'flex',flexDirection:'column',gap:'0.75rem'}}>
      <div style={{display:'flex',gap:'0.5rem',flexWrap:'wrap'}}>
        <div style={{position:'relative',flex:1,minWidth:'150px'}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="بحث..." style={{...INP,paddingRight:'2rem'}}/>
        </div>
        <select value={fStage} onChange={e=>setFStage(e.target.value)} style={{...INP,width:'auto'}}>
          <option value="">كل المراحل</option>
          {DEAL_STAGES.map(s=><option key={s.id} value={s.id}>{s.icon} {s.label}</option>)}
        </select>
      </div>
      {list.length===0?<div style={{background:B.card,border:`1px solid ${B.border}`,borderRadius:'1rem',padding:'2.5rem',textAlign:'center',color:B.muted,fontSize:'0.875rem'}}>ما كاينش نتائج</div>
      :<div style={{background:B.card,border:`1px solid ${B.border}`,borderRadius:'1rem',overflow:'hidden'}}>
        {list.map((c,i)=>{
          const stage=DEAL_STAGES.find(s=>s.id===c.stage);
          return(<div key={c.id} style={{display:'flex',alignItems:'center',gap:'0.75rem',padding:'0.875rem 1rem',borderBottom:i<list.length-1?`1px solid ${B.border}`:'none'}}>
            <div style={{width:38,height:38,borderRadius:'0.75rem',background:`${stage?.color||B.accent}22`,display:'grid',placeItems:'center',fontSize:'1.1rem',flexShrink:0}}>{stage?.icon||'👤'}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:'700',color:B.text,fontSize:'0.875rem'}}>{c.name}</div>
              <div style={{fontSize:'0.72rem',color:B.muted,display:'flex',gap:'0.5rem',flexWrap:'wrap'}}>
                {c.company&&<span>🏢 {c.company}</span>}
                {c.phone&&<span>📱 {c.phone}</span>}
                {c.value>0&&<span style={{color:B.accent,fontWeight:'600'}}>{fmt(c.value)} دج</span>}
              </div>
            </div>
            <div style={{display:'flex',gap:'0.25rem',alignItems:'center',flexShrink:0}}>
              <Badge label={`${stage?.icon} ${stage?.label}`} color={stage?.color}/>
              <button onClick={()=>onSelect(c)} style={{padding:'0.35rem 0.625rem',borderRadius:'0.5rem',border:`1px solid ${B.border}`,background:'transparent',color:B.text,cursor:'pointer',fontSize:'0.75rem',fontWeight:'700'}}>تفاصيل</button>
              <button onClick={()=>delContact(c.id)} style={{padding:'0.35rem',border:'none',background:'none',cursor:'pointer',display:'flex'}}><Ic n="trash" size={14} color={B.danger}/></button>
            </div>
          </div>);
        })}
      </div>}
    </div>
  );
}

function ContactForm({onClose,onSave,initial}){
  const[f,setF]=useState(initial||{name:'',company:'',phone:'',email:'',source:'ref',stage:'prospect',value:'',notes:''});
  const save=()=>{if(!f.name.trim())return alert('دخل الاسم');onSave({...f,value:Number(f.value)||0});};
  return(
    <Modal onClose={onClose} title={initial?'تعديل':'Prospect جديد'}>
      <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.75rem'}}>
          <Field label="الاسم الكامل"><input value={f.name} onChange={e=>setF({...f,name:e.target.value})} placeholder="اسم الزبون المحتمل" style={INP} autoFocus/></Field>
          <Field label="الشركة / الماركة"><input value={f.company} onChange={e=>setF({...f,company:e.target.value})} placeholder="اسم الشركة" style={INP}/></Field>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.75rem'}}>
          <Field label="الهاتف"><input value={f.phone} onChange={e=>setF({...f,phone:e.target.value})} placeholder="0555 123 456" style={INP}/></Field>
          <Field label="البريد الإلكتروني"><input type="email" value={f.email} onChange={e=>setF({...f,email:e.target.value})} placeholder="email@..." style={INP}/></Field>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.75rem'}}>
          <Field label="مصدر الاتصال">
            <select value={f.source} onChange={e=>setF({...f,source:e.target.value})} style={INP}>
              {SOURCES.map(s=><option key={s.id} value={s.id}>{s.l}</option>)}
            </select>
          </Field>
          <Field label="القيمة المتوقعة (دج)"><input type="number" value={f.value} onChange={e=>setF({...f,value:e.target.value})} placeholder="0" style={INP}/></Field>
        </div>
        <Field label="ملاحظات"><textarea value={f.notes} onChange={e=>setF({...f,notes:e.target.value})} placeholder="ملاحظات عن الصفقة..." style={{...INP,height:70,resize:'none'}}/></Field>
        <button onClick={save} style={{width:'100%',padding:'0.875rem',borderRadius:'0.75rem',background:B.accent,color:'white',fontWeight:'700',border:'none',cursor:'pointer'}}>{initial?'حفظ':'زيد'}</button>
      </div>
    </Modal>
  );
}

function ContactDetail({contact,data,onClose,onUpdate,onMove,onDelete}){
  const[editing,setEditing]=useState(false);
  const stage=DEAL_STAGES.find(s=>s.id===contact.stage);
  return(
    <Modal onClose={onClose} title={contact.name} width="32rem">
      <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
        <div style={{display:'flex',gap:'0.5rem',justifyContent:'space-between',alignItems:'center'}}>
          <Badge label={`${stage?.icon} ${stage?.label}`} color={stage?.color}/>
          <div style={{display:'flex',gap:'0.25rem'}}>
            <button onClick={()=>setEditing(!editing)} style={{padding:'0.35rem 0.625rem',borderRadius:'0.5rem',border:`1px solid ${B.border}`,background:'transparent',color:B.muted,cursor:'pointer',fontSize:'0.75rem',display:'flex',alignItems:'center',gap:'3px'}}><Ic n="pencil" size={13}/>تعديل</button>
            <button onClick={()=>onDelete(contact.id)} style={{padding:'0.35rem',border:'none',background:'none',cursor:'pointer',display:'flex'}}><Ic n="trash" size={15} color={B.danger}/></button>
          </div>
        </div>

        {editing
          ?<ContactForm initial={contact} onClose={()=>setEditing(false)} onSave={f=>{onUpdate(contact.id,f);setEditing(false);}}/>
          :<div style={{display:'flex',flexDirection:'column',gap:'0.625rem'}}>
            {[[' 🏢',contact.company],[' 📱',contact.phone],[' 📧',contact.email],[' 💰',contact.value>0?`${fmt(contact.value)} دج`:null]].filter(r=>r[1]).map(([icon,val],i)=>(
              <div key={i} style={{fontSize:'0.875rem',color:B.text}}><span style={{color:B.muted}}>{icon} </span>{val}</div>
            ))}
            {contact.notes&&<div style={{fontSize:'0.8rem',color:B.muted,background:B.inputBg,padding:'0.75rem',borderRadius:'0.75rem'}}>{contact.notes}</div>}
            <div>
              <div style={{fontSize:'0.75rem',fontWeight:'700',color:B.muted,marginBottom:'0.5rem'}}>نقل الصفقة</div>
              <div style={{display:'flex',gap:'0.375rem',flexWrap:'wrap'}}>
                {DEAL_STAGES.map(s=>(
                  <button key={s.id} onClick={()=>onMove(contact.id,s.id)}
                    style={{padding:'0.35rem 0.75rem',borderRadius:'9999px',border:`1px solid ${s.id===contact.stage?s.color:B.border}`,background:s.id===contact.stage?`${s.color}22`:'transparent',color:s.id===contact.stage?s.color:B.muted,cursor:'pointer',fontSize:'0.78rem',fontWeight:s.id===contact.stage?'700':'400'}}>
                    {s.icon} {s.label}
                  </button>
                ))}
              </div>
            </div>
          </div>
        }
      </div>
    </Modal>
  );
}

            const inv=data.invoices.filter(i=>i.clientId===c.id&&i.status==='pending').reduce((s,i)=>s+Number(i.amount),0);

            return(<div key={c.id} style={{background:B.card,border:`1px solid ${B.border}`,borderRadius:'1rem',padding:'1rem',borderRight:`4px solid ${c.color||B.accent}`}}>
              <div style={{display:'flex',alignItems:'center',gap:'0.75rem'}}>

                    <span style={{fontWeight:'700',color:B.text,fontSize:'0.95rem'}}>{c.name}</span>
                    <Badge label={c.status==='active'?'نشط':'متوقف'} color={c.status==='active'?B.success:B.muted}/>
                    {renewal!==null&&renewal<=30&&<Badge label={`تجديد ${renewal} يوم`} color={renewal<=7?B.danger:B.warning}/>}
                  </div>
                  <div style={{fontSize:'0.72rem',color:B.muted,display:'flex',gap:'0.75rem',marginTop:'3px',flexWrap:'wrap'}}>
                    {c.monthlyValue>0&&<span>💰 {fmt(c.monthlyValue)} دج/شهر</span>}
                    {c.phone&&<span>📱 {c.phone}</span>}
                    {tasks.length>0&&<span>📋 {tasks.length} مهمة</span>}
                    {inv>0&&<span style={{color:B.warning}}>🧾 {fmt(inv)} دج معلق</span>}
                  </div>
                </div>
                <div style={{display:'flex',gap:'0.25rem',flexShrink:0}}>
                  <button onClick={()=>onSelectClient(c)} style={{padding:'0.4rem 0.75rem',borderRadius:'0.5rem',border:`1px solid ${B.border}`,background:'transparent',color:B.text,cursor:'pointer',fontSize:'0.75rem',fontWeight:'700'}}>المهام</button>
                  <button onClick={()=>setEditing(c)} style={{padding:'0.4rem',border:'none',background:'none',cursor:'pointer',display:'flex'}}><Ic n="pencil" size={15}/></button>
                  <button onClick={()=>delClient(c.id)} style={{padding:'0.4rem',border:'none',background:'none',cursor:'pointer',display:'flex'}}><Ic n="trash" size={15} color={B.danger}/></button>
                </div>
              </div>
            </div>);
          })}
        </div>
      }
      {(showAdd||editing)&&<ClientForm initial={editing} onClose={()=>{setShowAdd(false);setEditing(null);}} onSave={c=>{if(editing)updClient(editing.id,c);else addClient(c);setShowAdd(false);setEditing(null);}}/>}
    </div>
  );
}

      <button onClick={save} style={{width:'100%',padding:'0.875rem',borderRadius:'0.75rem',background:B.accent,color:'white',fontWeight:'700',border:'none',cursor:'pointer'}}>{initial?'حفظ':'زيد'}</button>

}

// ─── INVOICES MODULE ──────────────────────────────────────
function InvoicesModule({data,addInvoice,updInvoice,delInvoice,addExpense,delExpense}){
  const[tab,setTab]=useState('invoices');
  const[showAdd,setShowAdd]=useState(false);
  const[showAddExp,setShowAddExp]=useState(false);
  const[showReport,setShowReport]=useState(false);

  // Month filter — default to current month
  const now=new Date();
  const[selMonth,setSelMonth]=useState(now.getMonth());
  const[selYear,setSelYear]=useState(now.getFullYear());

  const monthInvoices=data.invoices.filter(i=>{
    const d=new Date(i.createdAt);
    return d.getMonth()===selMonth&&d.getFullYear()===selYear;
  });
  const monthExpenses=data.expenses.filter(e=>{
    const d=new Date(e.date||e.createdAt);
    return d.getMonth()===selMonth&&d.getFullYear()===selYear;
  });

  const totalPaid=monthInvoices.filter(i=>i.status==='paid').reduce((s,i)=>s+Number(i.amount),0);
  const totalPending=monthInvoices.filter(i=>i.status==='pending').reduce((s,i)=>s+Number(i.amount),0);
  const totalExp=monthExpenses.reduce((s,e)=>s+Number(e.amount),0);

  const monthLabel=new Date(selYear,selMonth,1).toLocaleDateString('ar',{month:'long',year:'numeric'});
  const goMonth=delta=>{
    let m=selMonth+delta,y=selYear;
    if(m<0){m=11;y--;} if(m>11){m=0;y++;}
    setSelMonth(m);setSelYear(y);
  };
  const isCurrentMonth=selMonth===now.getMonth()&&selYear===now.getFullYear();

  return(
    <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'0.75rem'}}>
        <h2 style={{fontWeight:'900',color:B.text,fontSize:'1.25rem'}}>الفواتير والمصاريف</h2>
        <div style={{display:'flex',gap:'0.5rem'}}>
          <button onClick={()=>setShowReport(true)} style={{display:'flex',alignItems:'center',gap:'0.4rem',padding:'0.5rem 1rem',borderRadius:'9999px',border:`1px solid ${B.border}`,background:'transparent',color:B.text,fontWeight:'700',cursor:'pointer',fontSize:'0.85rem'}}>
            📊 تقرير الشهر
          </button>
          <button onClick={()=>tab==='invoices'?setShowAdd(true):setShowAddExp(true)} style={{display:'flex',alignItems:'center',gap:'0.4rem',padding:'0.5rem 1rem',borderRadius:'9999px',background:B.accent,color:'white',fontWeight:'700',border:'none',cursor:'pointer',fontSize:'0.85rem'}}>
            <Ic n="plus" size={16} color="white"/> {tab==='invoices'?'فاتورة جديدة':'مصروف جديد'}
          </button>
        </div>
      </div>

      {/* Month selector */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',background:B.card,border:`1px solid ${B.border}`,borderRadius:'1rem',padding:'0.625rem 0.875rem'}}>
        <button onClick={()=>goMonth(-1)} style={{padding:'0.4rem 0.625rem',borderRadius:'0.625rem',border:`1px solid ${B.border}`,background:'transparent',cursor:'pointer',display:'flex',color:B.muted}}><Ic n="chevR" size={15}/></button>
        <div style={{display:'flex',alignItems:'center',gap:'0.5rem'}}>
          <span style={{fontWeight:'800',color:B.text,fontSize:'0.95rem'}}>📅 {monthLabel}</span>
          {isCurrentMonth&&<Badge label="الشهر الحالي" color={B.accent}/>}
        </div>
        <button onClick={()=>goMonth(1)} style={{padding:'0.4rem 0.625rem',borderRadius:'0.625rem',border:`1px solid ${B.border}`,background:'transparent',cursor:'pointer',display:'flex',color:B.muted}}><Ic n="chevL" size={15}/></button>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'0.75rem'}}>
        <StatCard label="مقبوض هذا الشهر" value={`${fmt(totalPaid)} دج`} ic="wallet" color={B.success}/>
        <StatCard label="معلق هذا الشهر" value={`${fmt(totalPending)} دج`} ic="clock" color={B.warning}/>
        <StatCard label="مصاريف الشهر" value={`${fmt(totalExp)} دج`} ic="trending" color={B.danger}/>
      </div>

      <div style={{display:'flex',gap:'4px',background:B.card,padding:'3px',borderRadius:'0.875rem',border:`1px solid ${B.border}`,width:'fit-content'}}>
        {[{v:'invoices',l:'الفواتير'},{v:'expenses',l:'المصاريف'}].map(t=>(
          <button key={t.v} onClick={()=>setTab(t.v)} style={{padding:'0.4rem 1rem',borderRadius:'0.625rem',border:'none',cursor:'pointer',fontWeight:'700',fontSize:'0.85rem',background:tab===t.v?B.accent:'transparent',color:tab===t.v?'white':B.muted,transition:'all 0.15s'}}>{t.l}</button>
        ))}
      </div>
      {tab==='invoices'&&<InvoicesList data={{...data,invoices:monthInvoices}} updInvoice={updInvoice} delInvoice={delInvoice}/>}
      {tab==='expenses'&&<ExpensesList data={{...data,expenses:monthExpenses}} delExpense={delExpense}/>}
      {showAdd&&<InvoiceForm data={data} onClose={()=>setShowAdd(false)} onSave={inv=>{addInvoice(inv);setShowAdd(false);}}/>}
      {showAddExp&&<ExpenseForm onClose={()=>setShowAddExp(false)} onSave={exp=>{addExpense(exp);setShowAddExp(false);}}/>}
      {showReport&&<MonthReportModal data={data} invoices={monthInvoices} expenses={monthExpenses} monthLabel={monthLabel} onClose={()=>setShowReport(false)}/>}
    </div>
  );
}

function MonthReportModal({data,invoices,expenses,monthLabel,onClose}){
  const paid=invoices.filter(i=>i.status==='paid');
  const pending=invoices.filter(i=>i.status==='pending');
  const overdue=invoices.filter(i=>i.status==='pending'&&i.dueDate&&new Date(i.dueDate)<new Date());
  const totalPaid=paid.reduce((s,i)=>s+Number(i.amount),0);
  const totalPending=pending.reduce((s,i)=>s+Number(i.amount),0);
  const totalExp=expenses.reduce((s,e)=>s+Number(e.amount),0);
  const netProfit=totalPaid-totalExp;

  // Group pending by client — "من بقى يدفعلي"
  const pendingByClient={};
  pending.forEach(i=>{
    const cl=data.clients.find(c=>c.id===i.clientId);
    const name=cl?.name||'—';
    if(!pendingByClient[name])pendingByClient[name]=0;
    pendingByClient[name]+=Number(i.amount);
  });

  // Group paid by client — "شحال دفعولي"
  const paidByClient={};
  paid.forEach(i=>{
    const cl=data.clients.find(c=>c.id===i.clientId);
    const name=cl?.name||'—';
    if(!paidByClient[name])paidByClient[name]=0;
    paidByClient[name]+=Number(i.amount);
  });

  return(
    <Modal onClose={onClose} title={`📊 تقرير ${monthLabel}`} width="32rem">
      <div style={{display:'flex',flexDirection:'column',gap:'1.25rem'}}>

        {/* Summary */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.75rem'}}>
          <div style={{background:`${B.success}10`,border:`1px solid ${B.success}33`,borderRadius:'1rem',padding:'1rem',textAlign:'center'}}>
            <div style={{fontSize:'1.4rem',fontWeight:'900',color:B.success,fontVariantNumeric:'tabular-nums'}}>{fmt(totalPaid)}</div>
            <div style={{fontSize:'0.72rem',color:B.muted,marginTop:'2px'}}>دج دخلوا (مدفوع)</div>
          </div>
          <div style={{background:`${B.warning}10`,border:`1px solid ${B.warning}33`,borderRadius:'1rem',padding:'1rem',textAlign:'center'}}>
            <div style={{fontSize:'1.4rem',fontWeight:'900',color:B.warning,fontVariantNumeric:'tabular-nums'}}>{fmt(totalPending)}</div>
            <div style={{fontSize:'0.72rem',color:B.muted,marginTop:'2px'}}>دج باقي يدفعو</div>
          </div>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.75rem'}}>
          <div style={{background:`${B.danger}10`,border:`1px solid ${B.danger}33`,borderRadius:'1rem',padding:'1rem',textAlign:'center'}}>
            <div style={{fontSize:'1.2rem',fontWeight:'900',color:B.danger,fontVariantNumeric:'tabular-nums'}}>{fmt(totalExp)}</div>
            <div style={{fontSize:'0.72rem',color:B.muted,marginTop:'2px'}}>دج مصاريف</div>
          </div>
          <div style={{background:`${netProfit>=0?B.success:B.danger}10`,border:`1px solid ${netProfit>=0?B.success:B.danger}33`,borderRadius:'1rem',padding:'1rem',textAlign:'center'}}>
            <div style={{fontSize:'1.2rem',fontWeight:'900',color:netProfit>=0?B.success:B.danger,fontVariantNumeric:'tabular-nums'}}>{fmt(netProfit)}</div>
            <div style={{fontSize:'0.72rem',color:B.muted,marginTop:'2px'}}>دج ربح صافي</div>
          </div>
        </div>

        {/* Overdue alert */}
        {overdue.length>0&&(
          <div style={{background:`${B.danger}10`,border:`1px solid ${B.danger}33`,borderRadius:'1rem',padding:'0.875rem'}}>
            <div style={{fontWeight:'700',color:B.danger,fontSize:'0.85rem'}}>⚠️ {overdue.length} فاتورة متأخرة الدفع</div>
          </div>
        )}

        {/* Who still owes money */}
        {Object.keys(pendingByClient).length>0&&(
          <div>
            <div style={{fontWeight:'800',color:B.text,fontSize:'0.9rem',marginBottom:'0.625rem'}}>🟡 شحال باقي يدفعولي</div>
            <div style={{background:B.card2,border:`1px solid ${B.border}`,borderRadius:'1rem',overflow:'hidden'}}>
              {Object.entries(pendingByClient).sort((a,b)=>b[1]-a[1]).map(([name,amt],i,arr)=>(
                <div key={name} style={{display:'flex',justifyContent:'space-between',padding:'0.625rem 0.875rem',borderBottom:i<arr.length-1?`1px solid ${B.border}`:'none'}}>
                  <span style={{fontWeight:'600',color:B.text,fontSize:'0.85rem'}}>{name}</span>
                  <span style={{fontWeight:'700',color:B.warning,fontVariantNumeric:'tabular-nums'}}>{fmt(amt)} دج</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Who paid */}
        {Object.keys(paidByClient).length>0&&(
          <div>
            <div style={{fontWeight:'800',color:B.text,fontSize:'0.9rem',marginBottom:'0.625rem'}}>✅ شحال دفعولي</div>
            <div style={{background:B.card2,border:`1px solid ${B.border}`,borderRadius:'1rem',overflow:'hidden'}}>
              {Object.entries(paidByClient).sort((a,b)=>b[1]-a[1]).map(([name,amt],i,arr)=>(
                <div key={name} style={{display:'flex',justifyContent:'space-between',padding:'0.625rem 0.875rem',borderBottom:i<arr.length-1?`1px solid ${B.border}`:'none'}}>
                  <span style={{fontWeight:'600',color:B.text,fontSize:'0.85rem'}}>{name}</span>
                  <span style={{fontWeight:'700',color:B.success,fontVariantNumeric:'tabular-nums'}}>{fmt(amt)} دج</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {invoices.length===0&&expenses.length===0&&(
          <div style={{textAlign:'center',padding:'2rem',color:B.muted,fontSize:'0.875rem'}}>ما كاينش فواتير أو مصاريف هذا الشهر</div>
        )}
      </div>
    </Modal>
  );
}

              <button onClick={()=>delInvoice(inv.id)} style={{padding:'0.35rem',border:'none',background:'none',cursor:'pointer',display:'flex'}}><Ic n="trash" size={14} color={B.danger}/></button>
            </div>
          </div>);
        })}

  const save=()=>{if(!f.amount||Number(f.amount)<=0)return alert('دخل المبلغ');onSave({...f,amount:Number(f.amount)});};

const SVC_CATS=[

function ServiceModule({data,addService,updService,delService}){

  const pendingBookings=allBookings.filter(b=>b.status==='pending'||b.status==='confirmed');
  const totalRevenue=allBookings.filter(b=>b.status==='done').reduce((s,b)=>s+Number(b.total||0),0);

  const addBooking=(serviceId,booking)=>{
    const updated=services.map(s=>s.id===serviceId?{...s,bookings:[...(s.bookings||[]),{id:uid(),...booking,createdAt:new Date().toISOString()}]}:s);
    updService(serviceId,{bookings:updated.find(s=>s.id===serviceId).bookings});
  };
  const updBooking=(serviceId,bookingId,patch)=>{
    const svc=services.find(s=>s.id===serviceId);
    if(!svc)return;
    updService(serviceId,{bookings:(svc.bookings||[]).map(b=>b.id===bookingId?{...b,...patch}:b)});
  };
  const delBooking=(serviceId,bookingId)=>{
    const svc=services.find(s=>s.id===serviceId);

          <div style={{fontSize:'0.72rem',color:B.muted}}>حجوزات نشطة</div>
        </div>

        </div>

                <div key={b.id} style={{display:'flex',alignItems:'center',gap:'0.75rem',padding:'0.875rem 1rem',borderBottom:i<allBookings.length-1?`1px solid ${B.border}`:'none'}}>

// ─── BOOKING CALENDAR ─────────────────────────────────────
function BookingCalendar({allBookings,services,updBooking,delBooking}){
  const[viewDate,setViewDate]=useState(new Date());
  const[selDay,setSelDay]=useState(null);
  const[svcFilter,setSvcFilter]=useState('');

  const filteredBookings=svcFilter?allBookings.filter(b=>b.serviceId===svcFilter):allBookings;

  const year=viewDate.getFullYear();
  const month=viewDate.getMonth();
  const firstDay=new Date(year,month,1);
  const lastDay=new Date(year,month+1,0);
  const daysInMonth=lastDay.getDate();
  // Arabic week starts Sunday=0 but getDay() in JS: Sun=0...Sat=6. We want grid starting Sunday.
  const startWeekday=firstDay.getDay();
  const todayD=new Date();todayD.setHours(0,0,0,0);

  const monthLabel=viewDate.toLocaleDateString('ar',{month:'long',year:'numeric'});

  // Map date string -> bookings
  const byDate={};
  filteredBookings.forEach(b=>{
    if(!b.date)return;
    const key=b.date.slice(0,10);
    if(!byDate[key])byDate[key]=[];
    byDate[key].push(b);
  });

  const cells=[];
  for(let i=0;i<startWeekday;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);

  const goMonth=delta=>{const n=new Date(viewDate);n.setMonth(n.getMonth()+delta);setViewDate(n);};

  const dayKey=d=>`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const selDayBookings=selDay?byDate[dayKey(selDay)]||[]:[];

  const WEEKDAYS=['أحد','اثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'];

  return(
    <div style={{display:'flex',flexDirection:'column',gap:'0.875rem'}}>
      {/* Service filter */}
      {services.length>1&&(
        <div style={{display:'flex',gap:'0.375rem',overflowX:'auto',paddingBottom:'2px'}}>
          <button onClick={()=>setSvcFilter('')} style={{padding:'0.3rem 0.75rem',borderRadius:'9999px',border:`1px solid ${!svcFilter?B.accent:B.border}`,background:!svcFilter?`${B.accent}15`:'transparent',color:!svcFilter?B.accent:B.muted,cursor:'pointer',fontSize:'0.75rem',fontWeight:'700',whiteSpace:'nowrap'}}>كل الخدمات</button>
          {services.map(s=>(
            <button key={s.id} onClick={()=>setSvcFilter(svcFilter===s.id?'':s.id)} style={{padding:'0.3rem 0.75rem',borderRadius:'9999px',border:`1px solid ${svcFilter===s.id?B.accent:B.border}`,background:svcFilter===s.id?`${B.accent}15`:'transparent',color:svcFilter===s.id?B.accent:B.muted,cursor:'pointer',fontSize:'0.75rem',fontWeight:'700',whiteSpace:'nowrap'}}>{s.name}</button>
          ))}
        </div>
      )}

      {/* Calendar card */}
      <div style={{background:B.card,border:`1px solid ${B.border}`,borderRadius:'1.25rem',padding:'1rem',overflow:'hidden'}}>
        {/* Month nav */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'1rem'}}>
          <button onClick={()=>goMonth(-1)} style={{padding:'0.4rem 0.625rem',borderRadius:'0.625rem',border:`1px solid ${B.border}`,background:'transparent',cursor:'pointer',display:'flex',color:B.muted}}><Ic n="chevR" size={16}/></button>
          <div style={{fontWeight:'800',color:B.text,fontSize:'1rem'}}>{monthLabel}</div>
          <button onClick={()=>goMonth(1)} style={{padding:'0.4rem 0.625rem',borderRadius:'0.625rem',border:`1px solid ${B.border}`,background:'transparent',cursor:'pointer',display:'flex',color:B.muted}}><Ic n="chevL" size={16}/></button>
        </div>

        {/* Weekday headers */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'2px',marginBottom:'4px'}}>
          {WEEKDAYS.map(w=><div key={w} style={{textAlign:'center',fontSize:'0.68rem',fontWeight:'700',color:B.muted,padding:'4px 0'}}>{w}</div>)}
        </div>

        {/* Day grid */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'3px'}}>
          {cells.map((d,i)=>{
            if(d===null)return <div key={i}/>;
            const key=dayKey(d);
            const dayBookings=byDate[key]||[];
            const cellDate=new Date(year,month,d);
            const isToday_=cellDate.getTime()===todayD.getTime();
            const isSel=selDay===d;
            const hasBooking=dayBookings.length>0;
            const hasConfirmed=dayBookings.some(b=>b.status==='confirmed');
            const hasPending=dayBookings.some(b=>b.status==='pending');

            return(
              <button key={i} onClick={()=>setSelDay(isSel?null:d)}
                style={{
                  aspectRatio:'1',minHeight:'42px',borderRadius:'0.625rem',border:isSel?`2px solid ${B.accent}`:isToday_?`2px solid ${B.info}`:`1px solid ${B.border}`,

                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',gap:'0.5rem',alignItems:'center',flexWrap:'wrap'}}>
                        <span style={{fontWeight:'700',color:B.text,fontSize:'0.85rem'}}>{b.clientName}</span>

                      <div style={{fontSize:'0.72rem',color:B.muted,marginTop:'2px'}}>
                        {b.hours&&<span>⏱️ {b.hours} ساعة · </span>}
                        <span style={{color:B.accent,fontWeight:'600'}}>💰 {fmt(b.total)} دج</span>
                      </div>
                    </div>
                    <select value={b.status} onChange={e=>updBooking(b.serviceId,b.id,{status:e.target.value})}
                      style={{...INP,width:'auto',padding:'0.3rem 0.5rem',fontSize:'0.7rem',borderRadius:'0.5rem',color:st?.c,fontWeight:'700'}}>
                      {BOOK_STATUS.map(s=><option key={s.id} value={s.id}>{s.l}</option>)}
                    </select>
                    <button onClick={()=>delBooking(b.serviceId,b.id)} style={{padding:'0.3rem',border:'none',background:'none',cursor:'pointer',display:'flex'}}><Ic n="trash" size={13} color={B.danger}/></button>
                  </div>
                );
              })}
            </div>
          }
        </div>
      )}
    </div>
  );
}


function BookingForm({services,clients,onClose,onSave}){
  const[f,setF]=useState({serviceId:services[0]?.id||'',clientName:'',date:todayStr(),hours:'',total:'',status:'confirmed',notes:''});
  const svc=services.find(s=>s.id===f.serviceId);
  const unit=SVC_UNITS.find(u=>u.id===svc?.unit);
  // Auto-calculate total when hours change
  const calcTotal=h=>svc?.price&&h?Number(svc.price)*Number(h):f.total;
  const save=()=>{if(!f.clientName.trim()||!f.date)return alert('دخل اسم الزبون والتاريخ');onSave(f.serviceId,{clientName:f.clientName,date:f.date,hours:f.hours,total:Number(f.total)||0,status:f.status,notes:f.notes});};
  return(<Modal onClose={onClose} title="حجز جديد">
    <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
      <Field label="الخدمة">
        <select value={f.serviceId} onChange={e=>setF({...f,serviceId:e.target.value,total:''})} style={INP}>
          {services.map(s=><option key={s.id} value={s.id}>{s.name} — {fmt(s.price)} دج {SVC_UNITS.find(u=>u.id===s.unit)?.l}</option>)}
        </select>
      </Field>
      {svc&&<div style={{padding:'0.625rem 0.875rem',background:`${B.accent}10`,border:`1px solid ${B.accent}33`,borderRadius:'0.75rem',fontSize:'0.8rem',color:B.accent,fontWeight:'600'}}>
        💰 {fmt(svc.price)} دج {unit?.l}
      </div>}
      <Field label="اسم الزبون / الزبون">
        {clients.length>0
          ?<select value={f.clientName} onChange={e=>setF({...f,clientName:e.target.value})} style={INP}>
            <option value="">— اختار أو اكتب —</option>
            {clients.map(c=><option key={c.id} value={c.name}>{c.name}</option>)}
          </select>
          :<input value={f.clientName} onChange={e=>setF({...f,clientName:e.target.value})} placeholder="اسم الزبون" style={INP} autoFocus/>
        }
      </Field>
      {clients.length>0&&!f.clientName&&<input value={f.clientName} onChange={e=>setF({...f,clientName:e.target.value})} placeholder="أو اكتب اسم آخر" style={INP}/>}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.75rem'}}>
        <Field label="📅 التاريخ"><input type="date" value={f.date} onChange={e=>setF({...f,date:e.target.value})} style={INP}/></Field>
        {(svc?.unit==='hour')&&<Field label="⏱️ عدد الساعات">
          <input type="number" value={f.hours} onChange={e=>{const h=e.target.value;setF({...f,hours:h,total:calcTotal(h)});}} placeholder="0" style={INP}/>
        </Field>}
      </div>
      <Field label="💰 المجموع (دج)">
        <input type="number" value={f.total} onChange={e=>setF({...f,total:e.target.value})} placeholder="0 — يحتسب تلقائياً" style={INP}/>
      </Field>
      <Field label="الحالة">
        <div style={{display:'flex',gap:'0.375rem',flexWrap:'wrap'}}>
          {BOOK_STATUS.filter(s=>s.id!=='done').map(s=>(
            <button key={s.id} onClick={()=>setF({...f,status:s.id})}
              style={{flex:1,padding:'0.4rem',borderRadius:'0.75rem',border:`1px solid ${f.status===s.id?s.c:B.border}`,background:f.status===s.id?`${s.c}15`:'transparent',color:f.status===s.id?s.c:B.muted,cursor:'pointer',fontWeight:'700',fontSize:'0.78rem'}}>
              {s.l}
            </button>
          ))}
        </div>
      </Field>
      <Field label="ملاحظات"><input value={f.notes} onChange={e=>setF({...f,notes:e.target.value})} placeholder="أي معلومات إضافية..." style={INP}/></Field>
      <button onClick={save} style={{width:'100%',padding:'0.875rem',borderRadius:'0.75rem',background:B.accent,color:'white',fontWeight:'700',border:'none',cursor:'pointer'}}>أضف الحجز</button>
    </div>
  </Modal>);
}

// ─── REPORTS MODULE ───────────────────────────────────────
function ReportsModule({data}){
  const[period,setPeriod]=useState('month');
  const now=new Date();
  const getStart=()=>{const d=new Date();if(period==='month'){d.setDate(1);d.setHours(0,0,0,0);}else if(period==='quarter'){d.setMonth(Math.floor(d.getMonth()/3)*3,1);d.setHours(0,0,0,0);}else{d.setMonth(0,1);d.setHours(0,0,0,0);}return d;};
  const start=getStart();
  const invPeriod=data.invoices.filter(i=>new Date(i.createdAt)>=start);
  const rev=invPeriod.filter(i=>i.status==='paid').reduce((s,i)=>s+Number(i.amount),0);
  const pending=invPeriod.filter(i=>i.status==='pending').reduce((s,i)=>s+Number(i.amount),0);
  const expPeriod=data.expenses.filter(e=>new Date(e.date||e.createdAt)>=start).reduce((s,e)=>s+Number(e.amount),0);
  const profit=rev-expPeriod;
  const wonDeals=data.contacts.filter(c=>c.stage==='won').length;
  const lostDeals=data.contacts.filter(c=>c.stage==='lost').length;
  const convRate=wonDeals+lostDeals>0?Math.round(wonDeals/(wonDeals+lostDeals)*100):0;
  const memberPerf=data.members.map(m=>{
    const myTasks=data.tasks.filter(t=>(t.assignees||[]).includes(m.id));
    const done=myTasks.filter(t=>t.stage==='done').length;
    const od=myTasks.filter(t=>t.stage!=='done'&&isOverdue(t.dueDate)).length;
    return{...m,total:myTasks.length,done,overdue:od};
  }).sort((a,b)=>b.done-a.done);

  return(<div style={{display:'flex',flexDirection:'column',gap:'1.25rem'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'0.75rem'}}>
      <h2 style={{fontWeight:'900',color:B.text,fontSize:'1.25rem'}}>التقارير</h2>
      <div style={{display:'flex',gap:'4px',background:B.card,padding:'3px',borderRadius:'0.875rem',border:`1px solid ${B.border}`}}>
        {[{v:'month',l:'الشهر'},{v:'quarter',l:'الربع'},{v:'year',l:'السنة'}].map(p=>(
          <button key={p.v} onClick={()=>setPeriod(p.v)} style={{padding:'0.4rem 0.875rem',borderRadius:'0.625rem',border:'none',cursor:'pointer',fontWeight:'700',fontSize:'0.85rem',background:period===p.v?B.accent:'transparent',color:period===p.v?'white':B.muted,transition:'all 0.15s'}}>{p.l}</button>
        ))}
      </div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'0.75rem'}}>
      <StatCard label="الإيرادات" value={`${fmt(rev)} دج`} ic="wallet" color={B.success}/>
      <StatCard label="المصاريف" value={`${fmt(expPeriod)} دج`} ic="trending" color={B.danger}/>
      <StatCard label="الربح الصافي" value={`${fmt(profit)} دج`} ic="chart" color={profit>=0?B.success:B.danger}/>
      <StatCard label="معدل التحويل CRM" value={`${convRate}%`} ic="crm" color={B.info}/>
    </div>
    {memberPerf.length>0&&(<div><div style={{fontWeight:'800',color:B.text,fontSize:'1rem',marginBottom:'0.75rem'}}>أداء الفريق</div>
      <div style={{background:B.card,border:`1px solid ${B.border}`,borderRadius:'1rem',overflow:'hidden'}}>
        {memberPerf.map((m,i)=>(<div key={m.id} style={{display:'flex',alignItems:'center',gap:'0.75rem',padding:'0.75rem 1rem',borderBottom:i<memberPerf.length-1?`1px solid ${B.border}`:'none'}}>
          <Av name={m.name} color={m.color} size={36} fs={12}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:'700',color:B.text,fontSize:'0.875rem'}}>{m.name}</div>
            <div style={{display:'flex',gap:'0.5rem',marginTop:'3px',flexWrap:'wrap'}}>
              <span style={{fontSize:'0.72rem',color:B.success}}>✅ {m.done} مكتملة</span>
              <span style={{fontSize:'0.72rem',color:B.muted}}>📋 {m.total} إجمالي</span>
              {m.overdue>0&&<span style={{fontSize:'0.72rem',color:B.danger}}>⚠️ {m.overdue} متأخرة</span>}
            </div>
          </div>
          <div style={{fontWeight:'900',fontSize:'1.1rem',color:m.total>0?B.info:B.muted}}>{m.total>0?Math.round(m.done/m.total*100):0}%</div>
        </div>))}
      </div>
    </div>)}
    {data.clients.length>0&&(<div><div style={{fontWeight:'800',color:B.text,fontSize:'1rem',marginBottom:'0.75rem'}}>الإيرادات بالزبون</div>
      <div style={{background:B.card,border:`1px solid ${B.border}`,borderRadius:'1rem',overflow:'hidden'}}>
        {data.clients.map((c,i)=>{const total=data.invoices.filter(i=>i.clientId===c.id&&i.status==='paid').reduce((s,i)=>s+Number(i.amount),0);return(<div key={c.id} style={{display:'flex',alignItems:'center',gap:'0.75rem',padding:'0.75rem 1rem',borderBottom:i<data.clients.length-1?`1px solid ${B.border}`:'none'}}>
          <div style={{width:8,height:8,borderRadius:'50%',background:c.color||B.accent,flexShrink:0}}/>
          <div style={{flex:1,fontWeight:'600',color:B.text,fontSize:'0.875rem'}}>{c.name}</div>
          <span style={{fontWeight:'700',color:B.text,fontVariantNumeric:'tabular-nums'}}>{fmt(total)} دج</span>
        </div>);}).sort((a,b)=>0)}
      </div>
    </div>)}
  </div>);
}

// ─── TEAM MODULE ──────────────────────────────────────────
function TeamModule({data,addMember,updMember,delMember,payments=[],updPayment,delPayment}){
  const[showForm,setShowForm]=useState(false);const[editing,setEditing]=useState(null);
  const[name,setName]=useState('');const[role,setRole]=useState('editor');const[pw,setPw]=useState('');const[color,setColor]=useState(COLORS[0]);const[err,setErr]=useState('');
  const[tab,setTab]=useState('members');
  const save=()=>{
    if(!name.trim())return setErr('دخل الاسم');
    if(!editing&&pw.length<4)return setErr('4 حروف على الأقل');
    if(editing&&pw&&pw.length<4)return setErr('4 حروف على الأقل');
    if(editing){const p={name:name.trim(),role,color};if(pw)p.password=hash(pw);updMember(editing.id,p);}
    else addMember(name.trim(),role,pw,color);
    setShowForm(false);setEditing(null);setName('');setPw('');setErr('');
  };
  const pendingPayments=payments.filter(p=>p.status==='pending');
  const totalOwed=pendingPayments.reduce((s,p)=>s+Number(p.amount),0);
  return(<div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <h2 style={{fontWeight:'900',color:B.text,fontSize:'1.25rem'}}>الفريق</h2>
      <button onClick={()=>{setEditing(null);setName('');setRole('editor');setPw('');setColor(COLORS[0]);setShowForm(true);}} style={{display:'flex',alignItems:'center',gap:'0.4rem',padding:'0.5rem 1rem',borderRadius:'9999px',background:B.accent,color:'white',fontWeight:'700',border:'none',cursor:'pointer',fontSize:'0.85rem'}}>
        <Ic n="plus" size={16} color="white"/> زيد عضو
      </button>
    </div>
    <div style={{display:'flex',gap:'4px',background:B.card,padding:'3px',borderRadius:'0.875rem',border:`1px solid ${B.border}`,width:'fit-content'}}>
      {[{v:'members',l:`الأعضاء (${data.members.length})`},{v:'payments',l:`💰 المستحقات${totalOwed>0?' — '+fmt(totalOwed)+' دج':''}`}].map(t=>(
        <button key={t.v} onClick={()=>setTab(t.v)} style={{padding:'0.4rem 0.875rem',borderRadius:'0.625rem',border:'none',cursor:'pointer',fontWeight:'700',fontSize:'0.82rem',background:tab===t.v?B.accent:'transparent',color:tab===t.v?'white':B.muted,transition:'all 0.15s'}}>{t.l}</button>
      ))}
    </div>
    {tab==='members'&&(<>
      <div style={{padding:'0.75rem 1rem',background:B.soft,border:`1px solid ${B.accent}33`,borderRadius:'0.875rem',fontSize:'0.8rem',color:B.accent}}>
        💡 كل عضو يدخل باسمه + كلمة سرو — يشوف غير مهامه هو
      </div>
      {data.members.length===0?<div style={{background:B.card,border:`1px solid ${B.border}`,borderRadius:'1rem',padding:'3rem',textAlign:'center',color:B.muted}}>ما كاينش أعضاء</div>
      :<div style={{background:B.card,border:`1px solid ${B.border}`,borderRadius:'1rem',overflow:'hidden'}}>
        {data.members.map((m,i)=>{
          const tc=data.tasks.filter(t=>t.stage!=='done'&&t.stage!=='post'&&(t.assignees||[]).includes(m.id)).length;
          const done=data.tasks.filter(t=>(t.stage==='done'||t.stage==='post')&&(t.assignees||[]).includes(m.id)).length;
          const owed=pendingPayments.filter(p=>p.memberId===m.id).reduce((s,p)=>s+Number(p.amount),0);
          return(<div key={m.id} style={{display:'flex',alignItems:'center',gap:'0.75rem',padding:'0.875rem 1rem',borderBottom:i<data.members.length-1?`1px solid ${B.border}`:'none'}}>
            <Av name={m.name} color={m.color} size={40} fs={13}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:'700',color:B.text}}>{m.name}</div>
              <div style={{fontSize:'0.72rem',color:B.muted,display:'flex',gap:'0.5rem',flexWrap:'wrap'}}>
                <span>{ROLES.find(r=>r.id===m.role)?.l}</span>
                <span>·</span><span style={{color:tc>0?B.warning:B.muted}}>{tc} نشطة</span>
                <span>·</span><span style={{color:B.success}}>{done} مكتملة</span>
                {owed>0&&<><span>·</span><span style={{color:B.danger,fontWeight:'700'}}>💰 {fmt(owed)} دج</span></>}
              </div>
            </div>
            <div style={{display:'flex',gap:'0.25rem'}}>
              <button onClick={()=>{setEditing(m);setName(m.name);setRole(m.role);setColor(m.color);setPw('');setShowForm(true);}} style={{padding:'0.4rem',border:'none',background:'none',cursor:'pointer',display:'flex'}}><Ic n="pencil" size={15}/></button>
              <button onClick={()=>delMember(m.id)} style={{padding:'0.4rem',border:'none',background:'none',cursor:'pointer',display:'flex'}}><Ic n="trash" size={15} color={B.danger}/></button>
            </div>
          </div>);
        })}
      </div>}
    </>)}
    {tab==='payments'&&(
      <div style={{display:'flex',flexDirection:'column',gap:'0.75rem'}}>
        {pendingPayments.length===0
          ?<div style={{background:B.card,border:`1px solid ${B.border}`,borderRadius:'1rem',padding:'3rem',textAlign:'center',color:B.muted,fontSize:'0.875rem'}}>ما كاينش مستحقات دروك ✅</div>
          :data.members.map(m=>{
            const mPay=payments.filter(p=>p.memberId===m.id);
            const mOwed=pendingPayments.filter(p=>p.memberId===m.id).reduce((s,p)=>s+Number(p.amount),0);
            if(mPay.length===0)return null;
            return(<div key={m.id} style={{background:B.card,border:`1px solid ${mOwed>0?B.warning+'44':B.border}`,borderRadius:'1rem',padding:'1rem',borderRight:`4px solid ${mOwed>0?B.warning:B.success}`}}>
              <div style={{display:'flex',alignItems:'center',gap:'0.75rem',marginBottom:'0.625rem'}}>
                <Av name={m.name} color={m.color} size={36} fs={12}/>
                <div style={{flex:1}}>
                  <div style={{fontWeight:'700',color:B.text}}>{m.name}</div>
                  {mOwed>0&&<div style={{fontSize:'0.75rem',color:B.warning,fontWeight:'700'}}>💰 مستحق: {fmt(mOwed)} دج</div>}
                </div>
                {mOwed>0&&<button onClick={()=>mPay.filter(p=>p.status==='pending').forEach(p=>updPayment(p.id,{status:'paid'}))}
                  style={{padding:'0.4rem 0.875rem',borderRadius:'0.75rem',border:'none',background:B.success,color:'white',cursor:'pointer',fontWeight:'700',fontSize:'0.78rem'}}>✓ خلص الكل</button>}
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:'0.375rem'}}>
                {mPay.map(p=>{const paid=p.status==='paid';return(
                  <div key={p.id} style={{display:'flex',alignItems:'center',gap:'0.5rem',padding:'0.5rem 0.625rem',background:B.inputBg,borderRadius:'0.625rem',opacity:paid?0.6:1}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:'0.8rem',fontWeight:'600',color:B.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.taskTitle}</div>
                      <div style={{fontSize:'0.68rem',color:B.muted}}>{p.note||''} · {fmtD(p.createdAt)}</div>
                    </div>
                    <span style={{fontWeight:'700',color:paid?B.success:B.warning,fontVariantNumeric:'tabular-nums'}}>{fmt(p.amount)} دج</span>
                    {!paid&&<button onClick={()=>updPayment(p.id,{status:'paid'})} style={{padding:'2px 7px',borderRadius:'6px',border:`1px solid ${B.success}44`,background:`${B.success}10`,color:B.success,cursor:'pointer',fontSize:'0.7rem',fontWeight:'700'}}>✓</button>}
                    <button onClick={()=>delPayment(p.id)} style={{padding:'0.25rem',border:'none',background:'none',cursor:'pointer',display:'flex'}}><Ic n="trash" size={12} color={B.danger}/></button>
                  </div>
                );})}
              </div>
            </div>);
          })
        }
      </div>
    )}
    {showForm&&(<Modal onClose={()=>setShowForm(false)} title={editing?'تعديل':'عضو جديد'}>
      <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
        <Field label="الاسم"><input value={name} onChange={e=>setName(e.target.value)} placeholder="اسم العضو" style={INP} autoFocus/></Field>
        <Field label="الدور"><select value={role} onChange={e=>setRole(e.target.value)} style={INP}>{ROLES.map(r=><option key={r.id} value={r.id}>{r.l}</option>)}</select></Field>
        <Field label={editing?'كلمة سر جديدة (اختياري)':'كلمة السر'}><PwInput value={pw} onChange={setPw} placeholder={editing?'اتركها فارغة':'4 حروف على الأقل'} onEnter={save}/></Field>
        <Field label="اللون"><div style={{display:'flex',gap:'0.5rem',flexWrap:'wrap'}}>{COLORS.map(c=><button key={c} onClick={()=>setColor(c)} style={{width:30,height:30,borderRadius:'50%',background:c,border:color===c?'3px solid white':'3px solid transparent',cursor:'pointer',outline:color===c?`2px solid ${c}`:'none',outlineOffset:'1px'}}/>)}</div></Field>
        {err&&<div style={{fontSize:'0.75rem',color:B.danger,fontWeight:'700'}}>{err}</div>}
        <button onClick={save} style={{width:'100%',padding:'0.875rem',borderRadius:'0.75rem',background:B.accent,color:'white',fontWeight:'700',border:'none',cursor:'pointer'}}>{editing?'حفظ':'زيد'}</button>
      </div>
    </Modal>)}
